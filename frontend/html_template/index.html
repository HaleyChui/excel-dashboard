<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ONE WHM - 南茂科技</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  
  body{
    font-family:"Microsoft JhengHei","PingFang TC",-apple-system,Arial,sans-serif;
    background: #f5ede2;
    background-image: 
      radial-gradient(at 20% 0%, rgba(232, 200, 165, 0.45) 0px, transparent 50%),
      radial-gradient(at 80% 50%, rgba(214, 178, 140, 0.4) 0px, transparent 50%),
      radial-gradient(at 50% 100%, rgba(232, 213, 184, 0.5) 0px, transparent 50%);
    background-attachment: fixed;
    color: #4a3f33;
    min-height: 100vh;
    padding: 30px 30px;
    position: relative;
  }
  
  /* 細微紋理增加奶茶質感 */
  body::before{
    content:''; position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(168, 138, 100, 0.08) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }
  body > *{ position: relative; z-index: 1; }
  
  .logo-banner{
    max-width: 900px;
    margin: 30px auto 50px;
    background: linear-gradient(135deg, rgba(255, 251, 244, 0.95), rgba(248, 240, 229, 0.85));
    border: 1px solid rgba(168, 138, 100, 0.25);
    border-radius: 20px;
    padding: 32px 36px;
    display: flex; align-items: center; gap: 24px;
    box-shadow: 0 8px 30px rgba(168, 138, 100, 0.15), 0 0 40px rgba(232, 200, 165, 0.2);
    position: relative; overflow: hidden;
    animation: fadeDown 0.8s ease;
  }
  .logo-banner::before{
    content:''; position:absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #d68a4e, #c9a87a, #e8a87a, transparent);
  }
  @keyframes fadeDown{
    from{ opacity:0; transform: translateY(-15px); }
    to{ opacity:1; transform: translateY(0); }
  }
  
  .logo-icon{
    width: 70px; height: 70px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(214, 138, 78, 0.25), rgba(201, 168, 122, 0.25));
    border: 1px solid rgba(214, 138, 78, 0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(214, 138, 78, 0.2);
  }
  .logo-icon svg{ width: 40px; height: 40px; }
  
  .logo-text .company{
    font-size: 12px; color: #8a7860;
    letter-spacing: 2px; margin-bottom: 4px;
    font-weight: 600;
  }
  .logo-text .product{
    font-size: 32px; font-weight: 900;
    background: linear-gradient(135deg, #d68a4e, #b35d1e, #c97f4f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
  }
  
  .section-title{
    text-align: center;
    color: #8a7860;
    font-size: 16px;
    letter-spacing: 4px;
    margin: 30px 0 28px;
    font-weight: 600;
    animation: fadeUp 0.8s ease 0.2s both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(15px); }
    to{ opacity:1; transform: translateY(0); }
  }
  
  .dept-grid{
    max-width: 1300px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 200px));
    gap: 18px;
    justify-content: center;
    animation: fadeUp 0.8s ease 0.3s both;
  }
  
  .dept-card{
    background: linear-gradient(135deg, rgba(255, 251, 244, 0.95), rgba(248, 240, 229, 0.85));
    border: 1px solid rgba(168, 138, 100, 0.2);
    border-radius: 16px;
    padding: 24px 16px 18px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: all .35s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-height: 180px;
    box-shadow: 0 4px 14px rgba(168, 138, 100, 0.1);
  }
  .dept-card::before{
    content:''; position:absolute;
    top:0; left:0; right:0; height: 2px;
    background: var(--dc); opacity: 0.5;
  }
  .dept-card::after{
    content:''; position:absolute;
    top:0; left:-100%; width:100%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left .6s ease;
  }
  
  .dept-card.d1420{ --dc:#c9a87a; }
  .dept-card.d1423{ --dc:#8aa0ad; }
  .dept-card.d1425{ --dc:#7eb56a; }
  .dept-card.d3420{ --dc:#d68a4e; }
  .dept-card.d3421{ --dc:#a89684; }
  .dept-card.dport{ --dc:#c95a3f; }
  
  .dept-card.active{
    background: linear-gradient(155deg, rgba(212, 235, 200, 0.7), rgba(184, 220, 176, 0.5));
    border-color: rgba(126, 181, 106, 0.5);
    box-shadow: 0 8px 30px rgba(168, 138, 100, 0.15), 0 0 30px rgba(126, 181, 106, 0.25);
  }
  .dept-card.active::before{ opacity: 1; }
  .dept-card.active:hover{
    transform: translateY(-5px);
    box-shadow: 0 14px 40px rgba(168, 138, 100, 0.2), 0 0 50px rgba(126, 181, 106, 0.35);
    border-color: rgba(126, 181, 106, 0.8);
  }
  .dept-card.active:hover::after{ left: 100%; }
  
  .dept-card.building{
    opacity: 0.75;
    cursor: not-allowed;
  }
  .dept-card.building:hover{
    transform: translateY(-2px);
    border-color: rgba(168, 138, 100, 0.4);
    opacity: 0.9;
  }
  
  .dept-icon{
    width: 72px; height: 72px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245, 237, 226, 0.6);
    border: 1px solid rgba(168, 138, 100, 0.15);
    transition: all .3s;
  }
  .dept-card.active .dept-icon{
    box-shadow: inset 0 0 25px rgba(126, 181, 106, 0.15);
    border-color: rgba(126, 181, 106, 0.3);
    background: rgba(232, 245, 220, 0.5);
  }
  .dept-card.active:hover .dept-icon{
    box-shadow: inset 0 0 35px rgba(126, 181, 106, 0.3), 0 0 20px rgba(126, 181, 106, 0.2);
  }
  .dept-icon svg{ width: 44px; height: 44px; }
  
  .dept-code{
    font-size: 22px; font-weight: 800;
    color: #4a3f33;
    letter-spacing: 2px;
    font-family: 'SF Mono', 'Monaco', monospace;
  }
  .dept-card.building .dept-code{ color: #8a7860; }
  .dept-card.active .dept-code{
    background: linear-gradient(135deg, #5ba83f, #3d6b2e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .dept-status{
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .dept-status .dot{
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .dept-status.live{
    background: rgba(126, 181, 106, 0.2);
    color: #3d6b2e;
    border: 1px solid rgba(126, 181, 106, 0.45);
  }
  .dept-status.live .dot{
    background: #5ba83f;
    box-shadow: 0 0 6px #5ba83f;
    animation: pulse 2s ease-in-out infinite;
  }
  .dept-status.wip{
    background: rgba(168, 138, 100, 0.15);
    color: #8a7860;
    border: 1px solid rgba(168, 138, 100, 0.3);
  }
  .dept-status.wip .dot{
    background: #a89684;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; transform: scale(1); }
    50%{ opacity:0.5; transform: scale(1.2); }
  }
  
  .footer-info{
    margin-top: 60px;
    text-align: center;
    color: #a89684;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .footer-info .divider{
    margin: 0 8px;
    color: #c9b89a;
  }
  
  @media(max-width: 640px){
    .logo-banner{ flex-direction: column; text-align: center; }
  }
</style>
</head>

<script>
function updateTime(){
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const dd = String(now.getDate()).padStart(2,"0");
  const hh = String(now.getHours()).padStart(2,"0");
  const mi = String(now.getMinutes()).padStart(2,"0");
  const ss = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("now").textContent = `${yyyy}/${mm}/${dd} ${hh}:${mi}:${ss}`;
}
updateTime();
setInterval(updateTime, 1000);
</script>
