<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1425出勤管理系統 - 成品倉</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5EFE6;font-family:'PingFang TC','Noto Sans TC',-apple-system,sans-serif;background:#F5EFE6;color:#3D2B1F;padding-bottom:10px;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D4B896;border-radius:2px}

/* Header */
#header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#6B4C35,#8B6347);display:flex;align-items:center;gap:10px;padding:0 14px;height:52px}
#header .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#A67C5B,#8B6347);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
#header .title{flex:1}
#header .title h1{font-size:14px;font-weight:700;color:#fff}
#header .title p{font-size:9px;color:#BFDBFE}
#header .month-nav{display:flex;align-items:center;gap:5px}
#header .month-nav button{width:28px;height:28px;border-radius:6px;border:1px solid #FDE68A;background:#EDE0D0;color:#8B6347;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#header .month-nav span{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}

/* Bottom nav */
#bottom-nav{position:sticky;top:52px;z-index:90;background:#FDF8F2;border-bottom:2px solid #D4B896;display:flex;overflow-x:auto;box-shadow:0 2px 8px rgba(107,76,53,0.08)}
#bottom-nav button{flex:0 0 auto;min-width:50px;padding:5px 4px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#9C7A5E}
#bottom-nav button.active{color:#8B6347}
#bottom-nav button .icon{font-size:17px}
#bottom-nav button .label{font-size:9px;white-space:nowrap;font-weight:500}
#bottom-nav button .bar{width:18px;height:2px;border-radius:1px;background:#1D4ED8;display:none}
#bottom-nav button.active .bar{display:block}

/* Main content */
#app{padding:10px}

/* Summary strip */
#summary{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.sum-card{flex:0 0 auto;border-radius:6px;padding:3px 8px;min-width:52px;text-align:center}
.sum-card .sum-label{font-size:8px;color:#9C7A5E}
.sum-card .sum-val{font-size:13px;font-weight:700;margin:1px 0}
.sum-card .sum-unit{font-size:7px;color:#9C7A5E}

/* Filter bar */
#filter-bar{display:flex;flex-direction:column;gap:0;margin-bottom:8px}
#filter-bar button{flex:0 0 auto;padding:4px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:500;background:#EDE0D0;color:#7A5C44}
#filter-bar button.active{font-weight:700}

/* Calendar */
#calendar-grid{border-radius:10px;overflow:hidden;border:1px solid #D4B896}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-weekday{text-align:center;padding:7px 0;font-size:11px;font-weight:600;background:#EDE0D0;border-bottom:1px solid #D4B896}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:20px;padding:1px 2px;border-right:1px solid #D4B896;border-bottom:1px solid #D4B896;cursor:pointer;transition:opacity .15s}
.cal-cell:active{opacity:.7}
.cal-cell.empty{background:#EDE0D0;cursor:default}
.cal-cell .date-num{min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;padding:0 4px}
.cal-cell .date-num.today{background:#1D4ED8;color:#fff;font-weight:800;font-size:14px}
.cal-cell .duty-badge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;line-height:14px}
.cal-cell .badges{display:flex;flex-wrap:wrap;gap:1px;margin-top:2px}
.cal-cell .badge{font-size:10px;padding:1px 4px;border-radius:3px;line-height:15px}
.cal-cell .tap-hint{font-size:7px;color:#C8C4B0;text-align:right;margin-top:2px}
.cal-legend{padding:8px 10px;background:#FDF8F2;border-top:1px solid #D4B896;display:flex;flex-wrap:wrap;gap:6px}
.cal-legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:#9C7A5E}
.cal-legend-swatch{width:20px;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700}

/* Day view */
#day-selector{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px}
.day-tab{flex:0 0 auto;width:46px;border-radius:10px;padding:5px 0;text-align:center;cursor:pointer;border:1px solid #D4B896;transition:all .12s}
.day-tab.selected{background:linear-gradient(135deg,#A67C5B,#8B6347);border-color:#8B6347;color:#fff}
.day-tab .dt-duty{font-size:8px}
.day-tab .dt-num{font-size:14px;font-weight:700}
.day-tab .dt-count{font-size:8px}

#day-header{border-radius:10px;padding:12px 14px;margin-bottom:10px}
#day-header h2{font-size:17px;font-weight:700}
#day-header .day-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}

.emp-card{background:#FDF8F2;border-radius:12px;padding:12px 14px;border:1.5px solid #2D1B69;margin-bottom:8px}
.emp-card .emp-top{display:flex;align-items:center;gap:10px}
.emp-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;position:relative}
.emp-ot-dot{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:#DC2626;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700}
.emp-info{flex:1;min-width:0}
.emp-name{font-weight:700;font-size:15px}
.emp-tags{display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap}
.emp-tag{padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700}
.emp-shift-tag{padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700}
.emp-time{font-size:10px;color:#9C7A5E;margin-top:2px}
.emp-ot-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.emp-ot-tag{font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600}
.emp-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.emp-actions button{padding:5px 9px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #D4B896}
.shift-picker{margin-top:10px;padding-top:10px;border-top:1px solid #E8E4DA}
.shift-picker p{font-size:10px;color:#9C7A5E;margin-bottom:6px}
.shift-picker .sp-btns{display:flex;flex-wrap:wrap;gap:5px}
.shift-picker .sp-btns button{flex:1 0 auto;padding:7px 4px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;min-width:52px;background:transparent}

/* List view */
#list-wrap{overflow-x:auto}
#list-table{width:100%;border-collapse:collapse;font-size:10px}
#list-table th,#list-table td{padding:4px 3px;text-align:center;white-space:nowrap;border-bottom:1px solid #E0CDB8}
#list-table th{background:#EDE0D0;color:#7A5C44;font-weight:600;font-size:10px}
#list-table .sticky-l{position:sticky;left:0;z-index:2}
#list-table .sticky-l2{position:sticky;left:46px;z-index:2}
.shift-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:22px;border-radius:3px;font-size:11px;font-weight:700;border-width:1px;border-style:solid;cursor:pointer}
.stat-cell{display:flex;flex-direction:column;align-items:center;gap:0}
.stat-cell .sc-label{font-size:10px}
.stat-cell .sc-val{font-size:14px;font-weight:800}

/* Cards */
.card{background:#FDF8F2;border-radius:12px;padding:14px;border:1px solid #D4B896;margin-bottom:12px}
.card h3{font-size:13px;font-weight:700;color:#8B6347;margin-bottom:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat-box{background:#EDE0D0;border-radius:8px;padding:10px 12px;text-align:center}
.stat-box .sb-label{font-size:9px;color:#9C7A5E;margin-bottom:2px}
.stat-box .sb-val{font-size:18px;font-weight:700}
.stat-box .sb-unit{font-size:10px;margin-left:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:#EDE0D0;color:#7A5C44;padding:6px 8px;text-align:center;font-weight:600;white-space:nowrap}
.tbl td{padding:5px 8px;border-bottom:1px solid #E0CDB8;text-align:center;color:#5C4030}
.tbl tr:nth-child(even) td{background:#FDF8F2}
.tbl tfoot td{background:#6B4C35;color:#fff;font-weight:800;font-size:12px}

/* Modal */
#modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
#modal-backdrop.open{display:flex}
#modal-sheet{background:#FDF8F2;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;border:1px solid #D4B896;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#D4B896;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.modal-shift-badge{display:inline-block;padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;margin-bottom:12px;border:1px solid #D4B896}
.existing-records{margin-bottom:12px}
.existing-records h4{font-size:10px;color:#9C7A5E;margin-bottom:5px}
.rec-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;margin-bottom:4px}
.rec-badge{padding:1px 8px;border-radius:4px;font-size:11px;font-weight:700;flex-shrink:0}
.rec-note{flex:1;font-size:11px;color:#9C7A5E}
.rec-hours{font-size:13px;font-weight:700}
.rec-del{background:none;border:none;cursor:pointer;color:#DC2626;font-size:15px;opacity:.6}
.modal-section h4{font-size:11px;color:#9C7A5E;margin-bottom:7px}
.type-toggle{display:flex;gap:7px;margin-bottom:9px}
.type-toggle button{flex:1;padding:9px 0;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid #C8C4B0;background:transparent;color:#9C7A5E}
.type-toggle button.active-ot{border-color:#EF4444;background:#FCE8E8;color:#B91C1C}
.type-toggle button.active-leave{border-color:#EC4899;background:#FCE8F0;color:#BE185D}
.form-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #D4B896;background:#FDF8F2;color:#3D2B1F;font-size:13px;margin-bottom:7px}
.submit-btn{width:100%;padding:12px 0;border-radius:8px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* Holiday */
.hol-item{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:#FCE8E8;border:1px solid #FCA5A5;margin:3px}
.hol-del{background:none;border:none;cursor:pointer;color:#EF4444;font-size:13px;line-height:1}

/* Import */
.drop-zone{border:2px dashed #C8C4B0;border-radius:10px;padding:24px;text-align:center;transition:all .15s;background:#FDF8F2;margin-bottom:10px}
.drop-zone.dragover{border-color:#8B6347;background:#EDE0D0}
.import-log .log-row{font-size:11px;padding:4px 10px;border-radius:6px;margin-bottom:4px}
.import-log .log-ok{background:#EDE0D0;color:#A67C5B;border:1px solid #C6E8C2}
.import-log .log-err{background:#FCE8E8;color:#B91C1C;border:1px solid #FCA5A5}

/* People */
.person-card{background:#FDF8F2;border-radius:12px;padding:13px;border:1px solid #D4B896;margin-bottom:10px}
.person-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.person-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:9px}
.person-stat{background:#EDE0D0;border-radius:5px;padding:4px 0;text-align:center}
.person-stat .ps-label{font-size:8px;color:#9C7A5E}
.person-stat .ps-val{font-size:11px;font-weight:700}

/* Utils */
.pill{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700}
.btn-primary{background:linear-gradient(135deg,#A67C5B,#8B6347);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-secondary{background:#EDE0D0;color:#7A5C44;border:1px solid #D4B896;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-danger{background:#FCE8E8;color:#B91C1C;border:1px solid #FCA5A5;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer}
.flex{display:flex}.flex-col{flex-direction:column}.gap-1{gap:4px}.gap-2{gap:8px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.text-sm{font-size:11px}.text-xs{font-size:9px}.text-muted{color:#9C7A5E}.fw-7{font-weight:700}.fw-8{font-weight:800}
/* 次月班表格線 */
.sched-grid td{border:1px solid #D4B896;}
.sched-grid th{border:1px solid #C4A882;}

/* ── 表格十字架高亮（外框，不改底色） ── */
.tbl-cross-row { box-shadow: inset 0 2px 0 #10B981, inset 0 -2px 0 #10B981; }
.tbl-cross-col { box-shadow: inset 2px 0 0 #10B981, inset -2px 0 0 #10B981; }
.tbl-cross-cell { box-shadow: inset 0 0 0 2px #F59E0B; }

</style>
</head>

// NEXT-MONTH SHIFT SEGMENTS - 支援員工在月中切換班制（分段）
// state.nextMonthShift[empId] 可以是：
//   1. 字串 'A2'  → 整月用 A2（舊格式相容）
//   2. 陣列 [{from:'YYYY-MM-DD', code:'A1'}, {from:'YYYY-MM-DD', code:'A2'}] → 多段
// ══════════════════════════════════════════════════════════════
function getShiftSegments(empId){
  var v = state.nextMonthShift && state.nextMonthShift[empId];
  if(!v) return [];
  if(typeof v === 'string') return [{from:'0000-00-00', code:v}];
  if(Array.isArray(v)) return v.slice().sort(function(a,b){return a.from.localeCompare(b.from);});
  return [];
}
function getEffectiveShiftCode(empId, dateStr){
  // dateStr: 'YYYY-MM-DD'
  var segs = getShiftSegments(empId);
  var emp = currentEmps().find(function(x){return x.id===empId;});
  var base = emp ? emp.shiftCode : null;
  if(segs.length===0) return base;
  // 找出 from <= dateStr 的最後一段
  var hit = null;
  for(var i=0;i<segs.length;i++){
    if(segs[i].from<=dateStr) hit = segs[i];
    else break;
  }
  return hit ? hit.code : base;
}

// ══════════════════════════════════════════════════════════════
// 判斷某員工某日是否「實際出勤或加班」（用於 7 連班檢查）
// 來源：1) effCode 班制工作日  2) manualShift 手動覆寫  3) state.records 已有 OT  4) state.draftOT 草稿加班
// ══════════════════════════════════════════════════════════════
function isEmpWorkingOrOnOT(empId, dateStr){
  // 1. effective 班制行事曆
  var ec = getEffectiveShiftCode(empId, dateStr);
  if(ec && SHIFT_SCHEDULES[ec]){
    var st = SHIFT_SCHEDULES[ec][dateStr];
    // 工作日：'10' / '8' / '◎開頭'（國定假日調移當班）
    if(st==='10'||st==='8') return true;
    if(st && (st.indexOf('◎')===0 || st.indexOf('●')===0)) return true;
  }
  // 2. manualShift 手動覆寫（非 OFF 視為當班）
  var msKey = dateStr+'-'+empId;
  if(state.manualShift && state.manualShift[msKey] && state.manualShift[msKey]!=='OFF') return true;
  // 3. state.records 已有 OT
  if(state.records && state.records.some(function(r){return r.empId===empId&&r.date===dateStr&&r.type==='OT';})) return true;
  // 4. state.draftOT 草稿加班
  var dkey = empId+'-'+dateStr;
  if(state.draftOT && state.draftOT[dkey]) return true;
  // 5. 官方行事曆「補班」也算當班（非例假/休息 → 預設工作日 → 跳過交給班別判斷；這裡專處理「補班」）
  var calEntry = (typeof OFFICIAL_CALENDAR !== 'undefined' && OFFICIAL_CALENDAR) ? OFFICIAL_CALENDAR[dateStr] : null;
  if(calEntry && (calEntry.type==='補班' || calEntry.type==='調整上班')) return true;
  return false;
}

// 計算「若把 targetDate 加上去，會連續上班幾天」（自動找最大連續區間）
function computeConsecutiveDays(empId, targetDate){
  var before=0, after=0;
  for(var i=1;i<=30;i++){
    var prev=new Date(targetDate+'T00:00:00');
    prev.setDate(prev.getDate()-i);
    var ps=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
    if(isEmpWorkingOrOnOT(empId, ps)) before++; else break;
  }
  for(var i=1;i<=30;i++){
    var nxt=new Date(targetDate+'T00:00:00');
    nxt.setDate(nxt.getDate()+i);
    var ns=nxt.getFullYear()+'-'+String(nxt.getMonth()+1).padStart(2,'0')+'-'+String(nxt.getDate()).padStart(2,'0');
    if(isEmpWorkingOrOnOT(empId, ns)) after++; else break;
  }
  return before + 1 + after;
}

function getEmpPreferences(empId){

function getPreferenceOnDate(empId, dateStr){
  // 回傳該日符合的偏好提醒物件，否則 null
  var prefs = getEmpPreferences(empId);
  for(var i=0;i<prefs.length;i++){
    var p = prefs[i];
    if(p.from <= dateStr && dateStr <= p.to) return p;
  }
  return null;
}
function addEmpPreference(empId, fromDate, toDate, reason){
  if(!state.empPreferences) state.empPreferences = {};
  if(!state.empPreferences[empId]) state.empPreferences[empId] = [];
  state.empPreferences[empId].push({
    from: fromDate,
    to: toDate || fromDate,
    reason: reason || '',
    notified: false,  // 為未來推播鋪路
    createdAt: new Date().toISOString().slice(0,10)
  });
  // 依 from 排序
  state.empPreferences[empId].sort(function(a,b){return a.from.localeCompare(b.from);});
}
function removeEmpPreference(empId, index){
  if(!state.empPreferences || !state.empPreferences[empId]) return;
  state.empPreferences[empId].splice(index, 1);
  if(state.empPreferences[empId].length===0) delete state.empPreferences[empId];
}

  if(toStr < fromStr){alert('結束日不能早於起始日');return;}

  render();
}

function isShiftChangePoint(empId, dateStr){
  // 該日是否為「切換點」（有段的 from === dateStr）
  var segs = getShiftSegments(empId);
  return segs.some(function(s){return s.from===dateStr;});
}
function addShiftSegment(empId, fromDate, code){
  var v = state.nextMonthShift[empId];
  var arr = [];
  if(typeof v === 'string') arr = [{from:'0000-00-00', code:v}];
  else if(Array.isArray(v)) arr = v.slice();
  // 移除同日的舊段
  arr = arr.filter(function(s){return s.from!==fromDate;});
  // notified:false 為未來推播鋪路（伺服器版可用此旗標判斷是否已推送）
  arr.push({from:fromDate, code:code, notified:false, createdAt:new Date().toISOString().slice(0,10)});
  arr.sort(function(a,b){return a.from.localeCompare(b.from);});
  state.nextMonthShift[empId] = arr;
}
function removeShiftSegment(empId, fromDate){
  var v = state.nextMonthShift[empId];
  if(!Array.isArray(v)){
    // 若是舊字串格式，整個刪
    delete state.nextMonthShift[empId];
    return;
  }
  var arr = v.filter(function(s){return s.from!==fromDate;});
  if(arr.length===0) delete state.nextMonthShift[empId];
  else state.nextMonthShift[empId] = arr;
}
function clearShiftSegments(empId){
  delete state.nextMonthShift[empId];
}
function promptAddShiftSegment(empId, y, m){

  if(!dayStr) return;
  var day = parseInt(dayStr, 10);
  if(isNaN(day) || day<1 || day>dim){ alert('日期無效（必須是 1~'+dim+')'); return; }
  var fromDate = y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  var code = prompt('從 '+fromDate+' 起切換成哪個班制？\n可填：A1~A8 / B1~B8 / 常日', 'A1');
  if(!code) return;
  code = code.trim().toUpperCase();
  var valid = ['A1','A2','A3','A4','A5','A6','A7','A8','B1','B2','B3','B4','B5','B6','B7','B8','常日'];
  if(valid.indexOf(code)<0 && code!=='常日'){ alert('班制無效，必須是 A1~A8 / B1~B8 / 常日'); return; }
  addShiftSegment(empId, fromDate, code);
  render();
}

// BACKUP / RESTORE - 保留最近 5 份備份，每次破壞性操作前自動備份
// ══════════════════════════════════════════════════════════════
var BACKUP_PREFIX = '1425_finished_v1::backup::';
var BACKUP_MAX = 5;

function makeBackup(reason){
  try {
    var snapshot = {
      records: JSON.parse(JSON.stringify(state.records||[])),
      manualShift: JSON.parse(JSON.stringify(state.manualShift||{})),
      draftOT: JSON.parse(JSON.stringify(state.draftOT||{})),
      draftLeave: JSON.parse(JSON.stringify(state.draftLeave||{})),
      draftCancelOT: JSON.parse(JSON.stringify(state.draftCancelOT||{})),
      empPreferences: JSON.parse(JSON.stringify(state.empPreferences||{})),
      warehouseLeader: JSON.parse(JSON.stringify(state.warehouseLeader||{})),
      ts: new Date().toISOString(),
      reason: reason || '手動備份'
    };
    var ts = Date.now();
    localStorage.setItem(BACKUP_PREFIX+ts, JSON.stringify(snapshot));
    // 保留最近 N 份
    var keys = [];
    for(var i=0;i<localStorage.length;i++){
      var k = localStorage.key(i);
      if(k && k.indexOf(BACKUP_PREFIX)===0) keys.push(k);
    }
    keys.sort();
    while(keys.length>BACKUP_MAX){
      localStorage.removeItem(keys.shift());
    }
  } catch(e){ console.warn('備份失敗', e); }
}

function listBackups(){
  var list=[];
  try {
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k && k.indexOf(BACKUP_PREFIX)===0){
        try {
          var d=JSON.parse(localStorage.getItem(k));
          list.push({key:k, ts:d.ts, reason:d.reason, recCount:(d.records||[]).length});
        } catch(e){}
      }
    }
  } catch(e){}
  list.sort(function(a,b){return b.ts.localeCompare(a.ts);});
  return list;
}

function restoreBackup(key){
  try {
    var d = JSON.parse(localStorage.getItem(key));
    if(!d){alert('備份不存在或已損壞');return;}
    if(!confirm('⚠️ 確定還原此備份嗎？\n\n時間：'+d.ts+'\n原因：'+(d.reason||'')+'\n紀錄筆數：'+(d.records||[]).length+'\n\n還原會覆蓋目前的 records / manualShift / 草稿暫存。\n（還原前會再自動備份一次目前狀態，可再次回滾）'))return;
    makeBackup('還原前自動備份');
    state.records = d.records||[];
    state.manualShift = d.manualShift||{};
    state.draftOT = d.draftOT||{};
    state.draftLeave = d.draftLeave||{};
    state.draftCancelOT = d.draftCancelOT||{};

function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOf(y,m) { return new Date(y,m,1).getDay(); }
function toDateStr(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function rotIdx(dateStr){
  var d=new Date(dateStr+'T00:00:00');
  var diff=Math.round((d-ANCHOR)/86400000);
  return ((diff%4)+4)%4;
}
function dutyGroup(dateStr){ return rotIdx(dateStr)<2?'A':'B'; }
function isHoliday(dateStr){
  var entry=OFFICIAL_CALENDAR[dateStr];
  if(entry && (entry.type==='國定假日'||entry.type==='補假')) return true;
  if(state.holidays.has(dateStr)) return true;
  return false;
}
function isOfficialRestDay(dateStr){
  var dt = getDayType(dateStr);
  return dt === '休息日';  // Saturday
}
function isOfficialHoliday(dateStr){
  var dt = getDayType(dateStr);
  return dt === '國定假日' || dt === '補假';
}
function isWeekend(dateStr){
  var dt = getDayType(dateStr);
  return dt === '例假日' || dt === '休息日';
}
function groupColor(g){
  if(g==='A') return {bg:'#FEF3C7',text:'#92400E'};
  if(g==='B') return {bg:'#E0E7FF',text:'#4338CA'};
  return {bg:'#C7D2FE',text:'#0F766E'};
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getShift(emp, dateStr){
  var key = dateStr+'-'+emp.id;
  // manualShift 覆寫優先，但「OFF」視為「無覆寫」（因為 OFF 多半是自動草稿產生，不是真使用者手動指定）
  // 真要手動標 OFF 應該用其他機制
  if(state.manualShift[key] && state.manualShift[key]!=='OFF') return {shift:state.manualShift[key],manual:true,holiday:false};

  // ── 常日班 ──
  if(emp.group==='常日'){
    var calEntry=OFFICIAL_CALENDAR[dateStr];
    var dayType=calEntry?calEntry.type:'工作日';
    if(dayType==='例假日'||dayType==='休息日'||dayType==='國定假日'||dayType==='補假') return {shift:'OFF',manual:false,holiday:true};
    return {shift:'REGULAR',manual:false,holiday:false};
  }

  // ── A/B 班：依個人班制行事曆 SHIFT_SCHEDULES[emp.shiftCode] 判斷 ──
  // 每個 A1~A8 / B1~B8 班制都有自己的個別行事曆
  // 10/8/◎開頭 = 當班；例/休/休./輪 = OFF
  if(emp.group==='A' || emp.group==='B'){
    var effCode = getEffectiveShiftCode(emp.id, dateStr);
    if(effCode && SHIFT_SCHEDULES[effCode]){
      var status = SHIFT_SCHEDULES[effCode][dateStr];
      if(!status) return {shift:'OFF',manual:false,holiday:false};
      // 當班：10 / 8 小時
      if(status==='10' || status==='8'){
        var grp = effCode[0]==='A' ? 'A' : 'B';
        return {shift:emp.type==='night'?(grp==='A'?'NIGHT_A':'NIGHT_B'):(grp==='A'?'DAY_A':'DAY_B'),manual:false,holiday:false};
      }
      // 當班：◎ 開頭（國定假日調移當班，需加給）
      if(status.indexOf('◎')===0){
        var grp2 = effCode[0]==='A' ? 'A' : 'B';
        return {shift:emp.type==='night'?(grp2==='A'?'NIGHT_A':'NIGHT_B'):(grp2==='A'?'DAY_A':'DAY_B'),manual:false,holiday:false};
      }
      // OFF：例 / 休 / 休. / 輪
      return {shift:'OFF',manual:false,holiday:status==='例'||status==='休'||status==='休.'};
    }
    // 無班制代碼 fallback：A→A1, B→B1
    var fb = emp.group==='A' ? 'A1' : 'B1';
    if(SHIFT_SCHEDULES[fb]){
      var stF = SHIFT_SCHEDULES[fb][dateStr];
      if(stF==='10' || stF==='8' || (stF && stF.indexOf('◎')===0)){
        return {shift:emp.type==='night'?(emp.group==='A'?'NIGHT_A':'NIGHT_B'):(emp.group==='A'?'DAY_A':'DAY_B'),manual:false,holiday:false};
      }
      return {shift:'OFF',manual:false,holiday:stF==='例'||stF==='休'||stF==='休.'};
    }
  }

  return {shift:'OFF',manual:false,holiday:false};
}

function getDateRecords(empId, dateStr){
  return state.records.filter(function(r){return r.empId===empId&&r.date===dateStr;});
}

// 判斷該員工該日是否「本來該休、被 manualShift 改為上班」
function isManualWorkOverride(emp, dateStr){
  var key = dateStr+'-'+emp.id;
  var ms = state.manualShift[key];
  if(!ms || ms==='OFF') return false;
  var saved = state.manualShift[key];
  delete state.manualShift[key];
  var origShift = getShift(emp, dateStr).shift;
  state.manualShift[key] = saved;
  return origShift === 'OFF';
}

function calcEmpStats(emp){
  var dim=daysInMonth(state.year,state.month);
  var workDays=0,offDays=0,totalHours=0,otDays=0,leaveDays=0,otHours=0,leaveHours=0;
  for(var d=1;d<=dim;d++){
    var ds=toDateStr(state.year,state.month,d);
    var sh=getShift(emp,ds).shift;
    if(sh==='OFF') offDays++; else {workDays++;totalHours+=SHIFTS[sh].hours;}
    getDateRecords(emp.id,ds).forEach(function(r){
      if(r.type==='OT'){otDays++;otHours+=Number(r.hours)||0;}
      else{leaveDays++;leaveHours+=Number(r.hours)||0;}
    });
  }
  return {workDays,offDays,totalHours,otDays,leaveDays,otHours,leaveHours};
}

function calcDayStats(d, empList){
  var ds=toDateStr(state.year,state.month,d);
  var emps=empList||currentEmps();
  var counts={DAY_A:0,DAY_B:0,NIGHT_A:0,NIGHT_B:0,REGULAR:0,OFF:0};
  emps.forEach(function(emp){
    var sh=getShift(emp,ds).shift;
    counts[sh]++;
  });
  var dayS=counts.DAY_A+counts.DAY_B;
  var nightS=counts.NIGHT_A+counts.NIGHT_B;
  var regS=counts.REGULAR;
  // filtered count = non-OFF in empList
  var filtTotal=emps.length - counts.OFF;
  var recs=state.records.filter(function(r){return r.date===ds;});
  return {d,ds,ri:rotIdx(ds),duty:dutyGroup(ds),
    dayS,nightS,regS,counts,
    total:dayS+nightS+regS,         // all employees total
    filtTotal:filtTotal,             // filtered employees on duty
    otCount:recs.filter(function(r){return r.type==='OT';}).length,
    leaveCount:recs.filter(function(r){return r.type==='LEAVE';}).length,
    holiday:isHoliday(ds),holidayName:HOLIDAY_NAMES[ds]||''};
}

var EMP_PWD_KEY = '__1425_emp_pwd_hash__';
function _hashPwd(s){
  // 簡單 hash（FNV-1a 32-bit）— 只是混淆，非加密
  var h = 0x811c9dc5;
  for(var i=0;i<s.length;i++){
    h ^= s.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return h.toString(16);
}
function getStoredEmpPwd(){
  try { return localStorage.getItem(EMP_PWD_KEY) || ''; } catch(e){ return ''; }
}

  var p2 = prompt('請再輸入一次密碼確認');

function addRecord(empId, dateStr, type, leaveType, hours, note){
  if(!hours||isNaN(hours)||hours<=0) return;
  // ── OT/LEAVE 共用：排班規則檢查（例假日/休息日/休./國定假日）──
  if(typeof getEffectiveShiftCode === 'function'){
    var ecRule = getEffectiveShiftCode(empId, dateStr);
    var stRule = ecRule && SHIFT_SCHEDULES[ecRule] ? SHIFT_SCHEDULES[ecRule][dateStr] : null;
    var calRule = OFFICIAL_CALENDAR ? OFFICIAL_CALENDAR[dateStr] : null;
    var dayTypeRule = calRule ? calRule.type : '工作日';
    var empRule = currentEmps().find(function(e){return e.id===empId;});
    var nameRule = empRule ? empRule.name : '員工';
    
    // 例假日（紅）- 絕對不可加班
    if(type==='OT' && (dayTypeRule==='例假日' || stRule==='例')){
      if(!confirm('⛔ 勞基法警告：例假日\n\n'+nameRule+' '+dateStr+' 為「例假日」'+(stRule==='例'?'（班制 '+ecRule+' 標示為例）':'')+'\n\n依勞基法第36條，例假日「絕對不可」安排出勤（包括加班），唯一例外為天災事變。\n\n是否仍要強制新增此加班？（風險自負）')){

    }
    // 休息日 - 不可強制
    else if(type==='OT' && (dayTypeRule==='休息日' || stRule==='休')){
      if(!confirm('⚠️ 排班規則警告：休息日\n\n'+nameRule+' '+dateStr+' 為「休息日」'+(stRule==='休'?'（班制 '+ecRule+' 標示為休）':'')+'\n\n依「一例一休」原則，休息日加班需勞工自願，且加班費需加倍給付（勞基法第24條）。\n\n是否仍要新增此加班？')){
        return;
      }
    }
    // 休. - 例休日不可
    else if(type==='OT' && stRule==='休.'){
      if(!confirm('⛔ 排班規則警告：例休日\n\n'+nameRule+' '+dateStr+' 班制 '+ecRule+' 標示為「休.」（例休日）\n\n絕對不可安排出勤，違反勞基法第36條。\n\n是否仍要強制新增？（風險自負）')){
        return;
      }
    }
    // 國定假日 - 需加給
    else if(type==='OT' && (dayTypeRule==='國定假日' || dayTypeRule==='補假')){
      if(!confirm('⚠️ 排班規則提醒：國定假日\n\n'+nameRule+' '+dateStr+' 為「'+(calRule.name||dayTypeRule)+'」\n\n國定假日出勤需依勞基法第39條加倍給付工資。\n\n是否仍要新增此加班？')){
        return;
      }
    }
  }
  // ── LEAVE：當日該員是否當班？非當班不該請假 ──
  if(type==='LEAVE' && typeof getEffectiveShiftCode === 'function'){
    var ecLV = getEffectiveShiftCode(empId, dateStr);
    var stLV = ecLV && SHIFT_SCHEDULES[ecLV] ? SHIFT_SCHEDULES[ecLV][dateStr] : null;
    var isWorkLV = stLV==='10' || stLV==='8' || (stLV && (stLV.indexOf('◎')===0 || stLV.indexOf('●')===0));
    // 也看 manualShift 手動覆寫
    var msLV = state.manualShift && state.manualShift[dateStr+'-'+empId];
    if(msLV && msLV!=='OFF') isWorkLV = true;
    if(!isWorkLV){
      var empLV = currentEmps().find(function(e){return e.id===empId;});
      var nameLV = empLV ? empLV.name : '員工';
      var dispSt = stLV || '非當班';
      if(!confirm('⚠️ '+nameLV+' '+dateStr+' 並非當班日（'+dispSt+(ecLV?'，班制 '+ecLV:'')+'）\n\n非當班日通常不需登記請假。仍要強制新增嗎？')){
        return;
      }
    }
  }
  // 偏好提醒檢查（OT 才檢查）
  if(type==='OT' && typeof getPreferenceOnDate === 'function'){
    var pHit = getPreferenceOnDate(empId, dateStr);
    if(pHit){
      var ePF = currentEmps().find(function(e){return e.id===empId;});
      var nPF = ePF ? ePF.name : '員工';
      if(!confirm('🔔 員工偏好提醒\n\n'+nPF+' 在 '+dateStr+' 標記為「希望避開」'+(pHit.reason?'：'+pHit.reason:'')+'\n\n仍要新增加班嗎？')){
        return;
      }
    }
  }
  // 7 連班檢查（OT 才檢查）
  if(type==='OT' && typeof computeConsecutiveDays === 'function'){
    var consec = computeConsecutiveDays(empId, dateStr);
    if(consec >= 7){
      var empCK = currentEmps().find(function(e){return e.id===empId;});
      var nameCK = empCK ? empCK.name : '員工';
      if(!confirm('⚠️ 勞基法警告\n\n'+nameCK+' 若 '+dateStr+' 加班，會形成連續上班 '+consec+' 天，違反勞基法第36條（7休1原則）。\n\n仍要強制新增此加班嗎？')){
        return;
      }
    }
  }
  state.records.push({id:Date.now(),empId,date:dateStr,type,leaveType:type==='LEAVE'?leaveType:'',hours:Number(hours),note,autoOT:false});
  renderModal();render();
}
function deleteRecord(id){state.records=state.records.filter(function(r){return r.id!==id;});renderModal();render();}
// ── 本月資料健檢工具 ──
function getMonthRecordsByCategory(){
  var y=state.year, m=state.month;
  var dim=daysInMonth(y,m);
  var d1=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var d2=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  var recs=state.records.filter(function(r){return r.date>=d1&&r.date<=d2;});
  var byEmp={};
  currentEmps().forEach(function(e){
    byEmp[e.id]={name:e.name,group:e.group,auto:{ot:0,otCnt:0,lv:0,lvCnt:0},manual:{ot:0,otCnt:0,lv:0,lvCnt:0}};
  });
  recs.forEach(function(r){
    var slot=byEmp[r.empId];if(!slot)return;
    var cat=r.autoOT===true?'auto':'manual';
    var h=Number(r.hours||0);
    if(r.type==='OT'){slot[cat].ot+=h;slot[cat].otCnt++;}
    else{slot[cat].lv+=h;slot[cat].lvCnt++;}
  });
  return {byEmp:byEmp,d1:d1,d2:d2,total:recs.length};
}
function purgeMonthRecords(kind){
  var s=getMonthRecordsByCategory();
  var label=kind==='auto'?'系統/草稿產生（autoOT=true）':kind==='manual'?'手動建立（autoOT=false）':'全部';
  var n=state.records.filter(function(r){
    if(r.date<s.d1||r.date>s.d2)return false;
    if(kind==='auto')return r.autoOT===true;
    if(kind==='manual')return r.autoOT!==true;
    return true;
  }).length;
  if(n===0){alert('本月沒有可清除的紀錄（'+label+'）');return;}
  // 列出將要刪除的具體紀錄
  var toDelete=state.records.filter(function(r){
    if(r.date<s.d1||r.date>s.d2)return false;
    if(kind==='auto')return r.autoOT===true;
    if(kind==='manual')return r.autoOT!==true;
    return true;
  });
  toDelete.sort(function(a,b){return a.date.localeCompare(b.date);});
  var preview=toDelete.slice(0,15).map(function(r){
    var e=currentEmps().find(function(x){return x.id===r.empId;});
    var nm=e?e.name:'?';
    return '・'+r.date+' '+nm+' '+(r.type==='OT'?'加班':r.leaveType||'請假')+' '+r.hours+'h';
  }).join('\n');
  if(toDelete.length>15) preview+='\n…（其餘 '+(toDelete.length-15)+' 筆）';
  if(!confirm('⚠️ 確定要清除本月（'+s.d1+' ~ '+s.d2+'）所有「'+label+'」的加班/請假紀錄嗎？\n\n共 '+n+' 筆即將被刪除：\n'+preview+'\n\n操作前已自動備份，誤刪可至「💾 備份還原」還原。'))return;
  makeBackup('清除本月'+label+'紀錄前');
  state.records=state.records.filter(function(r){
    if(r.date<s.d1||r.date>s.d2)return true;
    if(kind==='auto')return r.autoOT!==true;
    if(kind==='manual')return r.autoOT===true;
    return false;
  });
  alert('已清除 '+n+' 筆紀錄。');
  render();
}
function purgeAllDrafts(){
  var drafts=Object.keys(state.draftOT||{}).length+Object.keys(state.draftLeave||{}).length+Object.keys(state.draftCancelOT||{}).length;
  if(drafts===0){alert('目前沒有未套用的草稿暫存');return;}
  if(!confirm('⚠️ 確定要清除所有未套用的草稿暫存（共 '+drafts+' 筆，跨所有月份）？\n\n操作前已自動備份。'))return;
  makeBackup('清除草稿暫存前');
  state.draftOT={};state.draftLeave={};state.draftCancelOT={};
  alert('已清除 '+drafts+' 筆草稿暫存。');
  render();
}
function toggleHoliday(ds){if(state.holidays.has(ds))state.holidays.delete(ds);else state.holidays.add(ds);render();}
function addHoliday(){
  var di=document.getElementById('newHolDate');
  var ni=document.getElementById('newHolName');
  if(!di||!di.value)return;
  state.holidays.add(di.value);
  if(ni&&ni.value) HOLIDAY_NAMES[di.value]=ni.value;
  di.value=''; if(ni)ni.value='';
  render();
}
function addEmployee(){
  var n=document.getElementById('newEmpName');
  var t=document.getElementById('newEmpType');
  var sc=document.getElementById('newEmpShiftCode');
  if(!n||!n.value.trim())return;
  var shiftCode=sc?sc.value:'';
  // A1~A8 → A班, B1~B8 → B班, 常日 → 常日班
  var group='常日';
  if(shiftCode==='常日') group='常日';
  else if(shiftCode && shiftCode[0]==='A') group='A';
  else if(shiftCode && shiftCode[0]==='B') group='B';
  var type=t?t.value:'day';
  // Auto-detect night shift from code
  // (已停用) 新增員工不再依班制代碼自動判斷日/夜班
  var isRegGroup=group==='常日';
  var defShift=isRegGroup?'REGULAR':(type==='night'?(group==='A'?'NIGHT_A':'NIGHT_B'):(group==='A'?'DAY_A':'DAY_B'));
  (state.warehouseEmployees[state.warehouse]=state.warehouseEmployees[state.warehouse]||[]).push({id:Date.now(),name:n.value.trim(),group,type,defShift,shiftCode:shiftCode||null});
  n.value=''; if(sc)sc.value=''; render();
}
function removeEmployee(id){
  state.warehouseEmployees[state.warehouse]=(state.warehouseEmployees[state.warehouse]||[]).filter(function(e){return e.id!==id;});
  render();
}

// dayType: '例假日'|'休息日'|'國定假日'|'補假'|'工作日'
// Get employee's personal schedule status from their shiftCode
// Returns: '10'=work, '例'=forbidden, '休'=no forced OT, '輪'=scheduled off, '◎'=moved holiday
function getPersonalStatus(emp, dateStr){
  var ec = getEffectiveShiftCode(emp.id, dateStr);
  if(!ec) return null;
  var sched = SHIFT_SCHEDULES[ec];
  if(!sched) return null;
  return sched[dateStr] || null;
}

// Check if employee can work on a date (based on personal schedule)
function getScheduleRule(emp, dateStr){
  var status = getPersonalStatus(emp, dateStr);
  if(!status) return null;
  if(status === '例') return {
    status:'例', level:'forbidden',
    label:'例假日', color:'#000000', bg:'#FFB3B3',
    msg:'⛔ 例假日（紅）：不可安排出勤，違反勞基法第36條'
  };
  if(status === '休') return {
    status:'休', level:'restricted',
    label:'休息日', color:'#000000', bg:'#FFFF00',
    msg:'⚠️ 休息日（黃）：不可強制安排加班，需勞工自願（一例一休）'
  };
  if(status === '休.') return {
    status:'休.', level:'forbidden',
    label:'例休日', color:'#000000', bg:'#00B0F0',
    msg:'⛔ 例休日（藍）：絕對不可安排出勤，違反勞基法第36條'
  };
  if(status === '輪') return {
    status:'輪', level:'info',
    label:'輪休日', color:'#000000', bg:'#FF6600',
    msg:'ℹ️ 輪休日：排定輪休，若出勤需經勞工同意並加給工資'
  };
  if(status === '◎') return {
    status:'◎', level:'warning',
    label:'調移假日', color:'#000000', bg:'#92D050',
    msg:'⚠️ 調移之國定假日：出勤需加給一日工資或補假'
  };
  if(status === '10' || status === '8') return {
    status:status, level:'ok',
    label:'正常出勤', color:'#16A34A', bg:'#DCFCE7',
    msg:'✅ 正常出勤日（'+status+'小時）'
  };
  return null;
}

function getDayType(dateStr){
  var e = OFFICIAL_CALENDAR[dateStr];
  return e ? e.type : null;
}

// 勞基法規則說明
// 例假日 (週日)：絕對不得出勤，例外需主管機關核准
// 休息日 (週六)：可出勤但需加倍給付，每月不得超過24小時
// 國定假日/補假：應放假，出勤需加倍給付
// 工作日：正常出勤
function checkLaborLaw(emp, dateStr, shift){
  var entry = OFFICIAL_CALENDAR[dateStr];
  if(!entry) return null;
  var dt     = entry.type;
  var level  = entry.level;
  var isWork = shift !== 'OFF';
  var alerts = [];

  if(dt === '例假日' && isWork){
    alerts.push({
      level: 'danger',
      rule: '勞基法第36條',
      msg:  '⛔ 例假日（週日）不得出勤！違反勞基法第36條。雇主不可強制要求出勤，違者處2萬～100萬元罰鍰。'
    });
  }
  if(dt === '休息日' && isWork){
    alerts.push({
      level: 'danger',
      rule: '勞基法第36條（一例一休）',
      msg:  '⛔ 休息日（週六）不可安排加班！雇主不可強制要求休息日出勤，需由勞工自願且加倍給付工資。'
    });
  }
  if(dt === '國定假日' && isWork){
    alerts.push({
      level: 'warning',
      rule: '勞基法第39條',
      msg:  '⚠️ 國定假日出勤，需加給一日工資，或經勞工同意後補假一日。'
    });
  }
  if(dt === '補假' && isWork){
    alerts.push({
      level: 'warning',
      rule: '勞基法第39條',
      msg:  '⚠️ 補假日出勤，需加給一日工資，或經勞工同意後補假一日。'
    });
  }
  return {dayType:dt, level:level, alerts:alerts};
}

// Check all employees for a month and return violations
function checkMonthViolations(year, month){
  var dim = daysInMonth(year, month);
  var violations = [];
  for(var d=1; d<=dim; d++){
    var ds = toDateStr(year, month, d);
    currentEmps().forEach(function(emp){
      var shObj = getShift(emp, ds);
      if(shObj.manual && shObj.shift !== 'OFF'){
        var check = checkLaborLaw(emp, ds, shObj.shift);
        if(check && check.alerts.length > 0){
          violations.push({emp, date:ds, shift:shObj.shift, check});
        }
      }
    });
  }
  return violations;
}

function parseCSV(text){
  var lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  var sep=lines[0].includes('\t')?'\t':',';
  var headers=lines[0].split(sep).map(function(h){return h.trim().replace(/^"|"$/g,'');});
  return lines.slice(1).map(function(line){
    var vals=line.split(sep).map(function(v){return v.trim().replace(/^"|"$/g,'');});
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  }).filter(function(row){return Object.values(row).some(function(v){return v!=='';});});
}

function handleImportFile(file){
  if(!file) return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(ext==='xlsx'||ext==='xls'){
    if(!window.XLSX){
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload=function(){readXLSX(file);};
      document.head.appendChild(s);
    } else readXLSX(file);
  } else {
    var fr=new FileReader();
    fr.onload=function(e){
      var rows=parseCSV(e.target.result);
      state.importPreview={rows,fileName:file.name,tab:state.importTab};
      state.importLog=[];
      render();
    };
    fr.readAsText(file,'UTF-8');
  }
}
function readXLSX(file){
  var fr=new FileReader();
  fr.onload=function(e){
    var wb=window.XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var rows=parseCSV(window.XLSX.utils.sheet_to_csv(ws));
    state.importPreview={rows,fileName:file.name,tab:state.importTab};
    state.importLog=[];
    render();
  };
  fr.readAsArrayBuffer(file);
}

function doImport(){
  if(!state.importPreview)return;
  var rows=state.importPreview.rows, type=state.importPreview.tab;
  var logs=[];
  if(type==='employees'){
    rows.forEach(function(row,i){
      var name=(row['姓名']||'').trim();
      var group=(row['組別']||'').trim();
      var t=(row['班別類型']||'day').trim();
      if(!name||!group){logs.push({ok:false,msg:'第'+(i+2)+'行：欄位不完整'});return;}
      if(!['A','B','常日'].includes(group)){logs.push({ok:false,msg:'第'+(i+2)+'行：組別無效「'+group+'」'});return;}
      if(currentEmps().find(function(e){return e.name===name;})){logs.push({ok:false,msg:'「'+name+'」已存在'});return;}
      var isReg=group==='常日';
      var defShift=isReg?'REGULAR':(t==='night'?(group==='A'?'NIGHT_A':'NIGHT_B'):(group==='A'?'DAY_A':'DAY_B'));
      (state.warehouseEmployees[state.warehouse]=state.warehouseEmployees[state.warehouse]||[]).push({id:Date.now()+Math.random(),name,group,type:t,defShift});
      logs.push({ok:true,msg:'✅ 新增：'+name+'（'+group+'班）'});
    });
  } else if(type==='schedule'){
    rows.forEach(function(row,i){
      var date=(row['日期']||'').trim();
      var empName=(row['員工姓名']||'').trim();
      var shRaw=(row['班別']||'').trim();
      var sh=SHIFT_ALIASES[shRaw]!==undefined?SHIFT_ALIASES[shRaw]:null;
      if(!date||!empName||sh===null){logs.push({ok:false,msg:'第'+(i+2)+'行：欄位不完整或班別無效'});return;}
      var emp=currentEmps().find(function(e){return e.name===empName;});
      if(!emp){logs.push({ok:false,msg:'找不到員工「'+empName+'」'});return;}
      state.manualShift[date+'-'+emp.id]=sh;
      logs.push({ok:true,msg:'✅ '+date+' '+empName+' → '+(SHIFTS[sh]?SHIFTS[sh].label:sh)});
    });
  } else if(type==='records'){
    var newRecs=[];
    rows.forEach(function(row,i){
      var date=(row['日期']||'').trim();
      var empName=(row['員工姓名']||'').trim();
      var type2=(row['類型']||'').trim().toUpperCase();
      var leaveTp=(row['假別']||'').trim();
      var hours=parseFloat(row['工時'])||0;
      var note=(row['備註']||'').trim();
      if(!date||!empName||!type2){logs.push({ok:false,msg:'第'+(i+2)+'行：欄位不完整'});return;}
      if(!['OT','LEAVE'].includes(type2)){logs.push({ok:false,msg:'第'+(i+2)+'行：類型無效「'+type2+'」'});return;}
      var emp=currentEmps().find(function(e){return e.name===empName;});
      if(!emp){logs.push({ok:false,msg:'找不到員工「'+empName+'」'});return;}
      newRecs.push({id:Date.now()+Math.random(),empId:emp.id,date,type:type2,leaveType:leaveTp,hours,note,autoOT:false});
      logs.push({ok:true,msg:'✅ '+date+' '+empName+' '+(type2==='OT'?'加班':'請假')+' '+hours+'h'});
    });
    state.records=state.records.concat(newRecs);
  }
  state.importLog=logs;
  state.importPreview=null;
  render();
}

function downloadTemplate(type){
  var templates={
    employees:'姓名,組別,班別類型\n王小明,A,day\n李美華,B,day\n張志強,A,night\n黃秀英,常日,day',
    schedule:'日期,員工姓名,班別\n2026-05-15,王小明,DAY_A\n2026-05-16,李美華,日B\n2026-05-17,張志強,休',
    records:'日期,員工姓名,類型,假別,工時,備註\n2026-05-20,王小明,OT,,4,專案加班\n2026-05-21,黃秀英,LEAVE,特休,8,'
  };
  var blob=new Blob(['\uFEFF'+templates[type]],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='匯入範本_'+type+'.csv';a.click();
  URL.revokeObjectURL(url);
}

function renderSummary(){
  var dim=daysInMonth(state.year,state.month);
  var totals={DAY_A:0,DAY_B:0,NIGHT_A:0,NIGHT_B:0,REGULAR:0,OFF:0};
  currentEmps().forEach(function(emp){
    for(var d=1;d<=dim;d++){
      var sh=getShift(emp,toDateStr(state.year,state.month,d)).shift;
      totals[sh]++;
    }
  });
  var otCount=state.records.filter(function(r){var d=new Date(r.date);return r.type==='OT'&&d.getFullYear()===state.year&&d.getMonth()===state.month;}).length;
  var lvCount=state.records.filter(function(r){var d=new Date(r.date);return r.type==='LEAVE'&&d.getFullYear()===state.year&&d.getMonth()===state.month;}).length;
  var items=[
    {label:'A班工作',val:totals.DAY_A+totals.NIGHT_A,unit:'班',color:'#92400E',bg:'#FFF7ED'},
    {label:'B班工作',val:totals.DAY_B+totals.NIGHT_B,unit:'班',color:'#166534',bg:'#EEF2FF'},
    {label:'常日班', val:totals.REGULAR,             unit:'班',color:'#0F766E',bg:'#F0FDFA'},
    {label:'總工時', val:currentEmps().reduce(function(a,e){return a+calcEmpStats(e).totalHours;},0),unit:'h',color:'#16A34A',bg:'#EFF6FF'},
    {label:'加班',   val:otCount,unit:'筆',color:'#B91C1C',bg:'#FEF2F2'},
    {label:'請假',   val:lvCount,unit:'筆',color:'#BE185D',bg:'#FDF2F8'},
  ];
  document.getElementById('summary').innerHTML=items.map(function(it){
    return '<div class="sum-card" style="background:'+it.bg+';border:1px solid '+it.color+'33">'
      +'<div class="sum-label">'+it.label+'</div>'
      +'<div class="sum-val" style="color:'+it.color+'">'+it.val+'</div>'
      +'<div class="sum-unit">'+it.unit+'</div></div>';
  }).join('');
}

function filteredEmps(){
  var f=state.empFilter;
  if(f==='all') return currentEmps();
  if(f==='A'||f==='B'||f==='常日') return currentEmps().filter(function(e){return e.group===f;});
  if(f==='DAY_A'||f==='DAY_B'||f==='NIGHT_A'||f==='NIGHT_B') return currentEmps().filter(function(e){return e.defShift===f;});
  // Employee ID filter
  var empId=Number(f);
  if(!isNaN(empId)&&empId>0) return currentEmps().filter(function(e){return e.id===empId;});
  return currentEmps();
}

// ── CALENDAR ──
function renderCalendar(){
  var dim=daysInMonth(state.year,state.month);
  var fd=firstDayOf(state.year,state.month);
  var cells='';
  for(var i=0;i<fd;i++) cells+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var ds=toDateStr(state.year,state.month,d);
    var dow=new Date(state.year,state.month,d).getDay();
    var st=calcDayStats(d);
    var ri=st.ri;
    var bgColor=st.holiday?'#FEF2F2':(ri<2?'#FFF7ED':'#EEF2FF');
    var topBorder=st.holiday?'2px solid #FCA5A5':(ri<2?'2px solid #FDE68A':'2px solid #C7D2FE');
    var isToday=(d===today.getDate()&&state.year===today.getFullYear()&&state.month===today.getMonth());
    var dateColor=dow===0?'#EF4444':dow===6?'#EF4444':'#2C2A1F';
    var dateNumStyle=isToday?'background:#1D4ED8;color:#fff;':('color:'+dateColor+';');
    var dutyBg=ri<2?'#FDE68A':'#C7D2FE';
    var dutyColor=ri<2?'#92400E':'#166634';

    // Build per-employee name tags grouped by shift type, sorted: 常日→日→夜
    var empsToShow = filteredEmps();
    var empsByType = {reg:[], day:[], night:[]};
    empsToShow.forEach(function(emp){
      var sh = getShift(emp, ds).shift;
      if(sh === 'OFF') return;
      if(sh === 'REGULAR') empsByType.reg.push({emp:emp, sh:sh});
      else if(sh === 'DAY_A' || sh === 'DAY_B') empsByType.day.push({emp:emp, sh:sh});
      else if(sh === 'NIGHT_A' || sh === 'NIGHT_B') empsByType.night.push({emp:emp, sh:sh});
    });
    var sortedEmps = empsByType.reg.concat(empsByType.day).concat(empsByType.night);
    var nameTagsHTML = '';
    sortedEmps.forEach(function(item){
      var emp = item.emp; var sh = item.sh;
      var s = SHIFTS[sh];
      var recs = getDateRecords(emp.id, ds);
      var hasOT = recs.some(function(r){return r.type==='OT';});
      var hasLV = recs.some(function(r){return r.type==='LEAVE';});
      var shLabel = sh==='DAY_A'||sh==='DAY_B'?'日':sh==='NIGHT_A'||sh==='NIGHT_B'?'夜':'常';
      // If has OT on working day, show orange border + 加 inside tag
      var tagBg   = hasOT ? '#FF8C00' : s.bg;
      var tagColor= hasOT ? '#fff'     : s.color;
      var tagBorder= hasOT ? '#FF6600' : s.border;
      var tagLabel= esc(emp.name.slice(0,3)) + shLabel + (hasOT ? '+加' : '');
      nameTagsHTML +=
        '<span style="display:inline-flex;align-items:center;gap:1px">'
          +'<span style="font-size:11px;padding:1px 4px;border-radius:2px;background:'+tagBg+';color:'+tagColor+';border:1px solid '+tagBorder+';font-weight:700;white-space:nowrap;line-height:16px" onclick="event.stopPropagation();openDay('+d+')">'
            +tagLabel
          +'</span>'
          +(hasLV?'<span style="font-size:11px;padding:1px 5px;border-radius:3px;background:#EC4899;color:#fff;font-weight:800;line-height:16px">假</span>':'')
        +'</span>';
    });

    // 非當班但有 OT/LEAVE 紀錄的員工標籤
    var otTagsHTML = '';
    var workingIds = sortedEmps.map(function(i){return i.emp.id;});
    empsToShow.forEach(function(emp){
      // 跳過已在當班列表的
      if(workingIds.indexOf(emp.id) >= 0) return;
      var recs = getDateRecords(emp.id, ds);
      var hasOT = recs.some(function(r){return r.type==='OT';});
      var hasLV = recs.some(function(r){return r.type==='LEAVE';});
      if(!hasOT && !hasLV) return;
      // 主標籤：有 OT 用橘色「加」、純請假用粉紅「假」
      var tagBg2 = hasOT ? '#FF8C00' : '#EC4899';
      var tagBorder2 = hasOT ? '#FF6600' : '#BE185D';
      var tagLabel2 = esc(emp.name.slice(0,3)) + (hasOT ? '加' : '假');
      otTagsHTML +=
        '<span style="display:inline-flex;align-items:center;gap:1px">'
          +'<span style="font-size:11px;padding:1px 4px;border-radius:2px;background:'+tagBg2+';color:#fff;border:1px solid '+tagBorder2+';font-weight:700;white-space:nowrap;line-height:16px" onclick="event.stopPropagation();openDay('+d+')">'
            +tagLabel2
          +'</span>'
          +(hasOT && hasLV?'<span style="font-size:11px;padding:1px 5px;border-radius:3px;background:#EC4899;color:#fff;font-weight:800;line-height:16px">假</span>':'')
        +'</span>';
    });

    var holBadge=st.holiday?'<span class="duty-badge" style="background:#FEE2E2;color:#DC2626">🔴'+(st.holidayName?st.holidayName.slice(0,2):'假')+'</span>':'';

    cells+='<div class="cal-cell" style="background:'+bgColor+';border-top:'+topBorder+';min-height:60px;position:relative" onclick="openDay('+d+')">'
      +'<div class="flex justify-between items-center mb-1">'
        +'<div class="date-num" style="'+dateNumStyle+'">'+d+'</div>'
        +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">'
          +holBadge
          +'<span class="duty-badge" style="background:'+dutyBg+';color:'+dutyColor+'">'+st.duty+'班</span>'
        +'</div>'
      +'</div>'
      +(nameTagsHTML||otTagsHTML?'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:1px">'+nameTagsHTML+otTagsHTML+'</div>':'')
      +(st.leaveCount>0?'<div style="font-size:11px;color:#EC4899;font-weight:700;margin-top:2px">請假'+st.leaveCount+'筆</div>':'')
      +(state.dayNotes[ds]?'<div style="font-size:11px;color:#6B4C35;background:#FEF9EE;border-radius:3px;padding:1px 3px;margin-top:2px;border-left:2px solid #D4B896;word-break:break-all">'+esc(state.dayNotes[ds])+'</div>':'')
      +'<span onclick="event.stopPropagation();setDayNote(\''+ds+'\')" style="position:absolute;bottom:2px;right:3px;background:#FFFEF9;font-size:12px;cursor:pointer;padding:1px 4px;border-radius:4px;line-height:1;box-shadow:0 1px 2px rgba(0,0,0,0.1);user-select:none" title="新增備註">📝</span>'
    +'</div>';
  }
  var autoCount = state.records.filter(function(r){
    var dt=new Date(r.date);
    return r.autoOT===true && dt.getFullYear()===state.year && dt.getMonth()===state.month;
  }).length;
  var monthTitleBar='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">'
    +'<div style="font-size:22px;font-weight:800;color:#3D2B1F;letter-spacing:1px">📅 '+state.year+'/'+(state.month+1)+' 月班表</div>'
    +(autoCount>0
      ? '<button onclick="purgeMonthRecords(\'auto\')" title="清除「套用草稿」或「手動切班」產生的自動加班/請假紀錄，手動建立的紀錄保留不動" style="padding:5px 12px;border-radius:6px;border:1px solid #FCD34D;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">🗑 清除本月自動排班紀錄（'+autoCount+' 筆）</button>'
      : '<span style="font-size:11px;color:#9CA38F;padding:4px 10px;border-radius:5px;background:#F5EFE6">本月無自動排班紀錄</span>')
  +'</div>';
  return '<div id="calendar-grid">'
    +monthTitleBar
    +'<div class="cal-weekdays">'+WEEKDAYS.map(function(w,i){
      var c=i===0?'#EF4444':i===6?'#2563EB':'#6B6B5A';
      return '<div class="cal-weekday" style="color:'+c+'">週'+w+'</div>';
    }).join('')+'</div>'
    +'<div class="cal-days">'+cells+'</div>'
    +'<div class="cal-legend">'
      +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:#FEF3C7;border:1px solid #FDE68A"></div>A班上班日</div>'
      +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:#EDE0D0;border:1px solid #C7D2FE"></div>B班上班日</div>'
      +'<div class="cal-legend-item"><div class="cal-legend-swatch" style="background:#FCE8E8;border:1px solid #FCA5A5">🔴</div>假日</div>'
    +'</div>'
  +'</div>';
}

// ── DAY VIEW ──
function renderDayView(){
  var dim=daysInMonth(state.year,state.month);
  // Day selector
  var tabs='';
  for(var d=1;d<=dim;d++){
    var st=calcDayStats(d);
    var dow=new Date(state.year,state.month,d).getDay();
    var isSel=d===state.selectedDay;
    var isT=d===today.getDate()&&state.year===today.getFullYear()&&state.month===today.getMonth();
    var rotBg=st.ri<2?'#FFF7ED':'#EEF2FF';
    var rotBorder=st.ri<2?'#FDE68A':'#C7D2FE';
    var dutyColor=st.ri<2?'#92400E':'#166534';
    var bg=isSel?'linear-gradient(135deg,#1D4ED8,#1E3A8A)':(isT?'#DBEAFE':rotBg);
    var border=isSel?'#1D4ED8':(isT?'#93C5FD':rotBorder);
    var textColor=isSel?'#fff':dutyColor;
    tabs+='<div class="day-tab" style="background:'+bg+';border-color:'+border+'" onclick="state.selectedDay='+d+';render()">'
      +'<div class="dt-duty" style="color:'+(isSel?'#BFDBFE':textColor)+'">'+st.duty+'班</div>'
      +'<div class="dt-num" style="color:'+(isSel?'#fff':'#2C2A1F')+'">'+d+'</div>'
      +'<div class="dt-count" style="color:'+(isSel?'#DBEAFE':'#6B6B5A')+'">'+st.total+'人</div>'
    +'</div>';
  }
  // Day detail
  var sel=state.selectedDay;
  var ds=toDateStr(state.year,state.month,sel);
  var st=calcDayStats(sel);
  var dow=new Date(state.year,state.month,sel).getDay();
  var dutyColor=st.ri<2?'#92400E':'#166534';
  var hdrBg=st.ri<2?'#FFF7ED':'#EEF2FF';
  var hdrBorder=st.ri<2?'#FDE68A':'#C7D2FE';
  var dateColor=dow===0?'#EF4444':dow===6?'#EF4444':'#2C2A1F';
  var hdr='<div id="day-header" style="background:'+hdrBg+';border:1px solid '+hdrBorder+'">'
    +'<div class="flex items-center gap-2 flex-wrap">'
      +'<h2 style="color:'+dateColor+'">'+(state.month+1)+'/'+sel+' 週'+WEEKDAYS[dow]+'</h2>'
      +(st.holiday?'<span class="pill" style="background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A5">🔴 '+(st.holidayName||'國定假日')+'</span>':'')
      +(st.holiday?'<span style="font-size:11px;color:#DC2626">常日班休假日</span>':'')
    +'</div>'
    +'<div class="day-meta">'
      +'<span class="pill" style="background:'+(st.ri<2?'#FDE68A':'#C7D2FE')+';color:'+dutyColor+'">'+st.duty+'班 上班日</span>'
      +'<span style="font-size:11px;color:#9C7A5E">在班 <b style="color:#8B6347">'+st.total+'</b> 人</span>'
      +(st.otCount>0?'<span style="font-size:11px;color:#DC2626">加班 <b>'+st.otCount+'</b></span>':'')
      +(st.leaveCount>0?'<span style="font-size:14px;color:#EC4899;font-weight:600">請假 <b>'+st.leaveCount+'</b></span>':'')
    +'</div>'
    +'<div class="flex gap-1 flex-wrap" style="margin-top:5px">'
      +(st.dayS>0?'<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#3D2E0A;color:#F59E0B;font-weight:600">日班 '+st.dayS+'人</span>':'')
      +(st.nightS>0?'<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#C4A882;color:#8B6347;font-weight:600">夜班 '+st.nightS+'人</span>':'')
      +(st.regS>0?'<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#C4A882;color:#8B6347;font-weight:600">常日 '+st.regS+'人</span>':'')
    +'</div>'
  +'</div>';
  // Emp cards
  var cards=filteredEmps().map(function(emp){
    var shObj=getShift(emp,ds);
    var sh=shObj.shift; var s=SHIFTS[sh];
    var gc=groupColor(emp.group);
    var recs=getDateRecords(emp.id,ds);
    var hasOT=recs.some(function(r){return r.type==='OT';});
    var hasLV=recs.some(function(r){return r.type==='LEAVE';});
    var crossGroup=isManualWorkOverride(emp,ds);
    var eckKey='day-'+sel+'-'+emp.id;
    var isEditing=state.editCellKey===eckKey;
    var otTagsHTML=recs.map(function(r){
      var isOT=r.type==='OT';
      var c=isOT?{bg:'rgba(239,68,68,0.12)',color:'#B91C1C'}:{bg:'rgba(236,72,153,0.12)',color:'#BE185D'};
      return '<span class="emp-ot-tag" style="background:'+c.bg+';color:'+c.color+';border:1px solid '+c.color+'44">'
        +(r.autoOT?'🔴 自動':'')+(isOT?'加班':(r.leaveType||'請假'))+' '+r.hours+'h'+((!r.autoOT&&r.note)?' · '+r.note:'')+'</span>';
    }).join('');
    var pickerHTML='';
    if(isEditing){
      var btns=Object.keys(SHIFTS).map(function(k){
        var sv=SHIFTS[k];
        return '<button onclick="setShiftAction('+emp.id+','+sel+',\''+k+'\')" style="border:1px solid '+sv.border+';color:'+sv.color+';'+(sh===k?'background:'+sv.bg+';':'')+'">'+(SHIFTS[k].label)+'</button>';
      }).join('');
      pickerHTML='<div class="shift-picker"><p>選擇班別（跨班自動計加班）：</p><div class="sp-btns">'+btns+'</div></div>';
    }
    return '<div class="emp-card" style="border-color:'+(crossGroup?'#EF4444':s.border)+'55">'
      +'<div class="emp-top">'
        +'<div class="emp-avatar" style="background:linear-gradient(135deg,'+s.color+'55,'+s.color+'22);border:2px solid '+s.color+'88">'
          +esc(emp.name[0])
          +(crossGroup?'<div class="emp-ot-dot">加</div>':'')
        +'</div>'
        +'<div class="emp-info">'
          +'<div class="flex items-center gap-1 flex-wrap">'
            +'<span class="emp-name">'+esc(emp.name)+'</span>'
            +'<span class="emp-tag" style="background:'+gc.bg+';color:'+gc.text+'">'+emp.group+'班</span>'
            +(crossGroup?'<span class="emp-tag" style="background:#FEE2E2;color:#DC2626;border:1px solid #FCA5A5">跨班加班</span>':'')
          +'</div>'
          +'<div class="flex gap-1 items-center flex-wrap" style="margin-top:4px">'
            +'<span class="emp-shift-tag" style="color:'+s.color+';background:'+s.bg+';border:1px solid '+s.border+'">'+s.label+'</span>'
            +'<span style="font-size:10px;color:#9C7A5E">🕐 '+SHIFT_TIMES[sh]+'</span>'
            +((emp.shiftCode?'<span style="font-size:10px;padding:1px 7px;border-radius:4px;background:#D4B896;color:#3D2B1F;font-weight:700;border:1px solid #C4A882">'+emp.shiftCode+'</span>':'')+(shObj.manual?'<span style="font-size:9px;color:#9C7A5E;border:1px solid #D4B896;border-radius:3px;padding:0 4px">手動</span>':''))
          +'</div>'
          +(recs.length?'<div class="emp-ot-tags">'+otTagsHTML+'</div>':'')+(emp.shiftCode?(function(){var pr=getScheduleRule(emp,ds);if(!pr)return '';if(pr.level==='ok')return '<div style="font-size:10px;color:#16A34A;margin-top:3px;font-weight:600">✅ '+pr.label+' — 可正常排班（'+pr.status+'小時）</div>';var isBlock=pr.level==='forbidden'||pr.level==='restricted';return '<div style="font-size:10px;color:'+(isBlock?'#B91C1C':'#92400E')+';margin-top:3px;font-weight:700;background:'+(isBlock?'#FEE2E2':'#FEF3C7')+';padding:3px 7px;border-radius:4px">'+pr.msg+'</div>';})():'')
        +'</div>'
        +'<div class="emp-actions">'
          +'<button onclick="state.editCellKey=state.editCellKey===\''+eckKey+'\'?null:\''+eckKey+'\';render()" style="color:'+s.color+';background:'+s.bg+';border-color:'+s.border+'">換班</button>'
          +'<button onclick="openModal('+emp.id+',\''+ds+'\')" style="background:#EDE0D0;color:#7A5C44">加班/假</button>'
        +'</div>'
      +'</div>'
      +pickerHTML
    +'</div>';
  }).join('');
  return '<div id="day-selector">'+tabs+'</div>'+hdr+cards;
}

// ── LIST VIEW ──
function renderList(){
  var dim=daysInMonth(state.year,state.month);
  var emps=(function(){
    var all=filteredEmps();
    var aDay=all.filter(function(e){return e.group==='A'&&e.type==='day';});
    var aNight=all.filter(function(e){return e.group==='A'&&e.type==='night';});
    var bDay=all.filter(function(e){return e.group==='B'&&e.type==='day';});
    var bNight=all.filter(function(e){return e.group==='B'&&e.type==='night';});
    var reg=all.filter(function(e){return e.group==='常日';});
    return aDay.concat(aNight).concat(bDay).concat(bNight).concat(reg);
  })();
  // Build header
  var thDays='';
  for(var d=1;d<=dim;d++){
    var ds=toDateStr(state.year,state.month,d);
    var st=calcDayStats(d);
    var dow=new Date(state.year,state.month,d).getDay();
    var isHol=st.holiday;
    var rotBg=isHol?'#FEF2F2':(st.ri<2?'#FFF7ED':'#EEF2FF');
    var dutyC=isHol?'#DC2626':(st.ri<2?'#92400E':'#166534');
    thDays+='<th style="background:'+rotBg+';'+(isHol?'border-top:2px solid #FCA5A5':'')+';cursor:pointer;min-width:28px;padding:3px 2px" onclick="openDay('+d+')">'
      +'<div style="color:'+(dow===0?'#EF4444':dow===6?'#EF4444':dutyC)+';font-size:9px;font-weight:700">'+d+'</div>'
      +'<div style="font-size:7px;color:'+dutyC+';font-weight:'+(isHol?700:400)+'">'+( isHol?'假':st.duty)+'</div>'
    +'</th>';
  }
  // Headcount row
  var hcRow='<td class="sticky-l" style="background:#EDE0D0;font-size:11px;color:#9C7A5E;font-weight:600">在班人數</td>'
    +'<td class="sticky-l2" style="background:#EDE0D0"></td>';
  for(var d=1;d<=dim;d++){
    var st=calcDayStats(d,emps);
    var rotBg=st.ri<2?'#1C1410':'#1E1040';
    hcRow+='<td style="padding:1px;background:'+rotBg+'">'
      +'<div style="width:26px;height:16px;border-radius:3px;background:#D4B896;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:800;font-size:9px;color:#6B4C35">'+st.filtTotal+'</div>'
      +(st.otCount>0?'<div style="font-size:10px;color:#EF4444;text-align:center;font-weight:600">加'+st.otCount+'</div>':'')
      +(st.leaveCount>0?'<div style="font-size:13px;color:#EC4899;text-align:center;font-weight:700">假'+st.leaveCount+'</div>':'')
    +'</td>';
  }
  hcRow+='<td colspan="5" style="background:#EDE0D0"></td>';
  // Emp rows
  var rows=emps.map(function(emp,ri){
    var gc=groupColor(emp.group);
    var es=calcEmpStats(emp);
    var rowBg=ri%2===0?'#F0E8DC':'#FDF8F2';
    var stickyBg=ri%2===0?'#EDE0D0':'#E8DDCE';
    var dayCells='';
    for(var d=1;d<=dim;d++){
      var ds=toDateStr(state.year,state.month,d);
      var st2=calcDayStats(d);
      var shObj=getShift(emp,ds);
      var sh=shObj.shift; var s=SHIFTS[sh];
      var recs2=getDateRecords(emp.id,ds);
      var hasOT=recs2.some(function(r){return r.type==='OT';});
      var hasLV=recs2.some(function(r){return r.type==='LEAVE';});
      var crossGroup=isManualWorkOverride(emp,ds);
      var rotBg=st2.ri<2?'#FFFBEB44':'#EEF2FF44';
      var pRule=emp.shiftCode?getScheduleRule(emp,ds):null;
      var pOverlay='';
      var cellTop='';
      if(pRule){
        if(pRule.status==='例'){cellTop='border-top:2px solid #EF4444';pOverlay='<div style="font-size:10px;color:#991B1B;text-align:center;font-weight:800;line-height:1.3">⛔例</div>';}
        else if(pRule.status==='休'){cellTop='border-top:2px solid #D4A800';pOverlay='<div style="font-size:10px;color:#7B6B00;text-align:center;font-weight:800;line-height:1.3">⛔休</div>';}
        else if(pRule.status==='輪'){cellTop='border-top:2px solid #7C3AED';pOverlay='<div style="font-size:10px;color:#6D28D9;text-align:center;line-height:1.3">輪</div>';}
        else if(pRule.status==='◎'){cellTop='border-top:2px solid #D97706';pOverlay='<div style="font-size:10px;color:#92400E;text-align:center;line-height:1.3">◎</div>';}
      }
      dayCells+='<td style="padding:1px;background:'+rotBg+';'+cellTop+'">';
      dayCells+=pOverlay;
      dayCells+='<div class="shift-badge" style="color:'+s.color+';background:'+s.bg+';border-color:'+(crossGroup?'#EF4444':s.border)+';'+(crossGroup?'box-shadow:0 0 0 1px #FCA5A5':'')+'" onclick="state.editCellKey=state.editCellKey===\'list-'+d+'-'+emp.id+'\'?null:\'list-'+d+'-'+emp.id+'\';render()">'+s.short+'</div>'
        +(hasOT?'<div title="點擊可編輯/取消加班" style="font-size:9px;font-weight:800;color:#B91C1C;background:#FEF3C7;border:1px solid #FCD34D;border-radius:3px;text-align:center;cursor:pointer;padding:1px 2px;margin-top:1px" onclick="openModal('+emp.id+',\''+ds+'\')">加 ✎</div>':'')
        +(hasLV?'<div title="點擊可編輯/取消請假" style="font-size:12px;font-weight:800;color:#BE185D;background:#FCE7F3;border:1px solid #F9A8D4;border-radius:3px;text-align:center;cursor:pointer;padding:2px 4px;margin-top:2px" onclick="openModal('+emp.id+',\''+ds+'\')">假 ✎</div>':'')
        +(state.editCellKey==='list-'+d+'-'+emp.id?renderInlinePicker(emp,d):'')
        +'</td>';
    }
    return '<tr style="background:'+rowBg+'">'
      +'<td class="sticky-l" style="background:'+stickyBg+';font-weight:800;font-size:14px;color:#3D2B1F">'+esc(emp.name)+(emp.shiftCode?'<br><span style="font-size:11px;padding:1px 6px;border-radius:3px;background:#D4B896;color:#3D2B1F;font-weight:700">'+emp.shiftCode+'</span>':'')+'</td>'
      +'<td class="sticky-l2" style="background:'+stickyBg+'"><span class="pill" style="background:'+gc.bg+';color:'+gc.text+';font-size:9px">'+emp.group+'</span></td>'
      +dayCells
      +'<td style="background:#EDE0D0;padding:2px 3px"><div class="stat-cell"><span class="sc-label" style="color:#3B5BDB">出勤</span><span class="sc-val" style="color:#A67C5B">'+es.workDays+'</span></div></td>'
      +'<td style="background:#FDF8F2;padding:2px 3px"><div class="stat-cell"><span class="sc-label text-muted">休假</span><span class="sc-val" style="color:#9C7A5E">'+es.offDays+'</span></div></td>'
      +'<td style="background:#EDE0D0;padding:2px 3px"><div class="stat-cell"><span class="sc-label" style="color:#3B5BDB">工時</span><span class="sc-val" style="color:#8B6347">'+es.totalHours+'h</span></div></td>'
      +'<td style="background:'+(getOtStatus(emp.id).level==='over'?'#FEE2E2':getOtStatus(emp.id).level==='warn'?'#FEF3C7':'#FCE8E8')+';padding:2px 3px"><div class="stat-cell"><span class="sc-label" style="color:#FCA5A5">加班</span><span class="sc-val" style="color:'+(getOtStatus(emp.id).level==='over'?'#B91C1C':'#DC2626')+'">'+(getOtStatus(emp.id).level==='over'?'⛔ ':getOtStatus(emp.id).level==='warn'?'⚠️ ':'')+es.otHours+'h</span></div></td>'
      +'<td style="background:#FCE8F0;padding:2px 3px"><div class="stat-cell"><span class="sc-label" style="color:#FBCFE8">請假</span><span class="sc-val" style="color:#EC4899">'+es.leaveHours+'h</span></div></td>'
    +'</tr>';
  }).join('');
  // Footer totals
  var fEmps=emps.map(function(e){return calcEmpStats(e);});
  var totW=fEmps.reduce(function(a,e){return a+e.workDays;},0);
  var totO=fEmps.reduce(function(a,e){return a+e.offDays;},0);
  var totH=fEmps.reduce(function(a,e){return a+e.totalHours;},0);
  var totOT=fEmps.reduce(function(a,e){return a+e.otHours;},0);
  var totLV=fEmps.reduce(function(a,e){return a+e.leaveHours;},0);
  var emptyDays='';
  for(var i=0;i<dim;i++) emptyDays+='<td style="background:#6B4C35"></td>';
  var footer='<tr>'
    +'<td class="sticky-l" style="background:#6B4C35;color:#fff;font-weight:800;font-size:12px;letter-spacing:1px">合計</td>'
    +'<td class="sticky-l2" style="background:#6B4C35"></td>'
    +emptyDays
    +'<td style="background:#6B4C35"><div class="stat-cell"><span class="sc-label" style="color:#BFDBFE">出勤</span><span class="sc-val" style="color:#EFF6FF;font-size:13px">'+totW+'</span></div></td>'
    +'<td style="background:#6B4C35"><div class="stat-cell"><span class="sc-label" style="color:#DBEAFE">休假</span><span class="sc-val" style="color:#DBEAFE;font-size:13px">'+totO+'</span></div></td>'
    +'<td style="background:#6B4C35"><div class="stat-cell"><span class="sc-label" style="color:#BFDBFE">工時</span><span class="sc-val" style="color:#EFF6FF;font-size:13px">'+totH+'h</span></div></td>'
    +'<td style="background:#6B4C35"><div class="stat-cell"><span class="sc-label" style="color:#FCA5A5">加班</span><span class="sc-val" style="color:#FEE2E2;font-size:13px">'+totOT+'h</span></div></td>'
    +'<td style="background:#6B4C35"><div class="stat-cell"><span class="sc-label" style="color:#FBCFE8">請假</span><span class="sc-val" style="color:#FCE7F3;font-size:13px">'+totLV+'h</span></div></td>'
  +'</tr>';
  return '<div id="list-wrap"><table id="list-table"><thead>'
    +'<tr><th class="sticky-l" style="background:#EDE0D0;min-width:46px">員工</th>'
    +'<th class="sticky-l2" style="background:#EDE0D0;min-width:28px">組</th>'
    +thDays
    +'<th style="background:#D4B896;color:#A67C5B;border-top:2px solid #7C3AED">出勤</th>'
    +'<th style="background:#D4B896;color:#9C7A5E;border-top:2px solid #7C3AED">休假</th>'
    +'<th style="background:#D4B896;color:#8B6347;border-top:2px solid #7C3AED">工時</th>'
    +'<th style="background:#D4B896;color:#B91C1C;border-top:2px solid #7C3AED">加班</th>'
    +'<th style="background:#D4B896;color:#BE185D;border-top:2px solid #7C3AED">請假</th>'
    +'</tr>'
    +'<tr>'+hcRow+'</tr>'
    +'</thead><tbody>'+rows+'</tbody><tfoot>'+footer+'</tfoot></table></div>';
}

function renderInlinePicker(emp, day){

  }).join('');
  return '<div style="position:fixed;z-index:999;background:#FDF8F2;border:1px solid #D4B896;border-radius:8px;padding:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);min-width:120px;display:flex;flex-direction:column;gap:3px" id="inline-picker-popup">'+btns+'<button onclick="event.stopPropagation();state.editCellKey=null;render()" style="margin-top:3px;padding:2px;border-radius:4px;border:1px solid #D4B896;background:#F5EFE6;color:#9C7A5E;font-size:9px;cursor:pointer">✕ 關閉</button></div>';

// ── STATS ──
function renderStats(){
  var dim=daysInMonth(state.year,state.month);
  var totals={DAY_A:0,DAY_B:0,NIGHT_A:0,NIGHT_B:0,REGULAR:0,OFF:0};
  currentEmps().forEach(function(emp){
    for(var d=1;d<=dim;d++){
      totals[getShift(emp,toDateStr(state.year,state.month,d)).shift]++;
    }
  });
  var allStats=currentEmps().map(function(e){return Object.assign({},e,calcEmpStats(e));});
  var otRecs=state.records.filter(function(r){var d=new Date(r.date);return r.type==='OT'&&d.getFullYear()===state.year&&d.getMonth()===state.month;});
  var lvRecs=state.records.filter(function(r){var d=new Date(r.date);return r.type==='LEAVE'&&d.getFullYear()===state.year&&d.getMonth()===state.month;});
  var boxes=[
    {label:'A班總工時',val:allStats.filter(function(e){return e.group==='A';}).reduce(function(a,e){return a+e.totalHours;},0)+'h',color:'#92400E'},

function renderQuery(){
  var empOpts=currentEmps().map(function(e){return '<option value="'+e.id+'"'+(state.qEmp==e.id?' selected':'')+'>'+esc(e.name)+'</option>';}).join('');

  // ── 日期比對：用字串直接比對，避免時區問題 ──
  function inRange(dateStr){
    return dateStr>=state.qFrom && dateStr<=state.qTo;
  }
  function empMatch(empId){
    return state.qEmp==='all' || empId===Number(state.qEmp);
  }

  // ── 加班/請假紀錄 ──
  var recResults=state.records.filter(function(r){
    var typeOK = state.qType==='all' || state.qType==='OT_LEAVE'
      ? true
      : r.type===state.qType;
    // 如果 qType 是 schedule 就不顯示紀錄
    if(state.qType==='schedule') return false;
    return inRange(r.date) && empMatch(r.empId) && (state.qType==='all'||r.type===state.qType);
  }).sort(function(a,b){return a.date.localeCompare(b.date);});

  // ── 排班明細：列出區間內每天每人的班別 ──
  var scheduleRows=[];
  if(state.qType==='all'||state.qType==='schedule'){
    var d=new Date(state.qFrom+'T00:00:00');
    var endD=new Date(state.qTo+'T00:00:00');
    while(d<=endD){
      var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      currentEmps().forEach(function(emp){
        if(!empMatch(emp.id)) return;
        var shObj=getShift(emp,ds);
        var sh=shObj.shift;
        scheduleRows.push({date:ds,emp:emp,shift:sh,shObj:shObj});
      });
      d.setDate(d.getDate()+1);
    }
  }

  // ── 統計：區間內每人加班/請假 ──
  var empSummary=currentEmps().filter(function(e){return empMatch(e.id);}).map(function(emp){
    var recs=state.records.filter(function(r){return r.empId===emp.id&&inRange(r.date);});
    var otR=recs.filter(function(r){return r.type==='OT';}), lvR=recs.filter(function(r){return r.type==='LEAVE';});
    // Count work/off days in range
    var workDays=0,offDays=0;
    scheduleRows.filter(function(sr){return sr.emp.id===emp.id;}).forEach(function(sr){
      if(sr.shift==='OFF') offDays++; else workDays++;
    });
    return Object.assign({},emp,{
      workDays:workDays,offDays:offDays,
      otCount:otR.length,otHours:otR.reduce(function(a,r){return a+Number(r.hours||0);},0),

  var sumRows=empSummary.map(function(e,ri){

      +'<td style="color:#9C7A5E">'+esc(r.leaveType||r.note||'—')+'</td>'
      +'<td style="font-weight:700;color:'+(isOT?'#EF4444':'#EC4899')+'">'+r.hours+'h</td>'

  var filterBar='<div class="card"><h3>🔍 日期區間查詢</h3>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'

        +'<span style="font-size:12px;color:#9C7A5E">從</span>'
        +'<input type="date" value="'+state.qFrom+'" onchange="state.qFrom=this.value;render()" style="padding:7px 10px;border-radius:8px;border:1px solid #D4B896;background:#FDF8F2;color:#3D2B1F;font-size:12px">'
        +'<span style="font-size:12px;color:#9C7A5E">到</span>'
        +'<input type="date" value="'+state.qTo+'" onchange="state.qTo=this.value;render()" style="padding:7px 10px;border-radius:8px;border:1px solid #D4B896;background:#FDF8F2;color:#3D2B1F;font-size:12px">'
      +'</div>'

        +'<select onchange="state.qEmp=this.value;render()" style="flex:1;padding:7px 10px;border-radius:8px;border:1px solid #D4B896;background:#FDF8F2;color:#3D2B1F;font-size:12px">'

// ── OT Limit Helpers ─────────────────────────────────────────
function getOtLimit(empId){
  if(state.otLimits[empId] !== undefined) return state.otLimits[empId];
  return state.otGlobalDefault;
}
function setOtLimit(empId, hours){
  state.otLimits[empId] = Number(hours);
  render();
}
function getOtUsed(empId){
  var d1=toDateStr(state.year,state.month,1);
  var d2=toDateStr(state.year,state.month,daysInMonth(state.year,state.month));
  return state.records.filter(function(r){
    return r.empId===empId && r.type==='OT' && r.date>=d1 && r.date<=d2;
  }).reduce(function(a,r){return a+Number(r.hours||0);},0);
}
function getOtStatus(empId){
  var limit=getOtLimit(empId);
  var used=getOtUsed(empId);
  var pct=limit>0?Math.round(used/limit*100):0;
  var level='ok';
  if(used > limit) level='over';
  else if(limit>0 && used>=limit*0.8) level='warn';
  return {limit,used,pct,level};
}

function renderLaborLaw(){
  var qCode = state.laborQCode || '';
  var dim = daysInMonth(state.year, state.month);
  var violations = [];
  var warnings   = [];

  for(var d=1; d<=dim; d++){
    var ds = toDateStr(state.year, state.month, d);
    var dt = getDayType(ds);
    currentEmps().forEach(function(emp){
      var shObj = getShift(emp, ds);
      var sh    = shObj.shift;
      if(sh === 'OFF') return;
      // Official calendar check
      var check = checkLaborLaw(emp, ds, sh);
      if(check && check.alerts.length > 0){
        check.alerts.forEach(function(alert){
          var item = {emp:emp, date:ds, shift:sh, dayType:dt||'', alert:alert};
          if(alert.level === 'danger') violations.push(item);
          else warnings.push(item);
        });
      }
      // Personal shift schedule check
      if(emp.shiftCode){
        var rule = getScheduleRule(emp, ds);
        if(rule && rule.level !== 'ok'){
          var alv = (rule.level==='forbidden'||rule.level==='restricted')?'danger':'warning';
          var item = {emp:emp, date:ds, shift:sh, dayType:rule.label, alert:{
            level:alv, rule:'個人班制（'+emp.shiftCode+'）', msg:rule.msg
          }};
          if(alv==='danger') violations.push(item); else warnings.push(item);
        }
      }
    });
  }

  // Consecutive 7 days check（含加班/manual/draft 來源）
  var consViolations = [];
  currentEmps().forEach(function(emp){
    var consec=0;
    for(var d=1;d<=dim;d++){
      var ds=toDateStr(state.year,state.month,d);
      var working = (typeof isEmpWorkingOrOnOT === 'function')
        ? isEmpWorkingOrOnOT(emp.id, ds)
        : (getShift(emp,ds).shift!=='OFF');
      if(!working) { consec=0; continue; }
      consec++;
      if(consec>=7){
        var sh=getShift(emp,ds).shift;
        consViolations.push({emp:emp,date:ds,shift:sh,dayType:'連班',alert:{
          level:'danger',rule:'勞基法第36條',
          msg:'⛔ 已連續上班'+consec+'天（含加班），違反勞基法第36條（每7日應有1日例假）'

      +'<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;text-align:center"><div style="font-size:9px;color:#FCA5A5">⛔ 違規</div><div style="font-size:20px;font-weight:800;color:#fff">'+(violations.length+consViolations.length)+'</div></div>'
      +'<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;text-align:center"><div style="font-size:9px;color:#FCD34D">⚠️ 注意</div><div style="font-size:20px;font-weight:800;color:#fff">'+warnings.length+'</div></div>'
      +'<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;text-align:center"><div style="font-size:9px;color:#FCA5A5">總問題</div><div style="font-size:20px;font-weight:800;color:#fff">'+total+'</div></div>'
    +'</div>'
  +'</div>';

  var lawCard='<div class="card" style="margin-bottom:10px"><h3>📋 勞基法重點規定</h3>'
    +'<div style="display:flex;flex-direction:column;gap:5px;font-size:11px">'
    +[
      ['⛔ 例（紅）','例假日絕對禁止出勤，違者罰2萬～100萬（第36條）'],
      ['⛔ 休（藍）','休息日不可強制安排加班，需勞工自願（一例一休第36條）'],
      ['⚠️ 國定假日','出勤需加給一日工資或補假（第39條）'],
      ['⚠️ 輪休日','排定輪休，出勤需雙方協議'],
      ['ℹ️ 第30條','每日正常工時≤8小時，每週≤40小時'],
      ['ℹ️ 第32條','每月加班上限46小時（含休息日）'],
    ].map(function(r){return '<div style="display:flex;gap:8px;padding:5px 8px;border-radius:5px;background:#F5EFE6"><b style="flex-shrink:0;color:#92400E;min-width:66px">'+r[0]+'</b><span style="color:#5C4030">'+r[1]+'</span></div>';}).join('')
  +'</div></div>';

  if(total===0){
    return lookupHTML+header+lawCard
      +'<div class="card" style="text-align:center;padding:28px">'
        +'<div style="font-size:36px;margin-bottom:8px">✅</div>'
        +'<div style="font-size:15px;font-weight:700;color:#3D6B35;margin-bottom:4px">本月排班符合勞基法規定</div>'
        +'<div style="font-size:11px;color:#9CA38F">未偵測到違規或需注意排班</div>'
      +'</div>';
  }

  var dangerHTML=(violations.length+consViolations.length)>0
    ?'<div class="card" style="border:1px solid #FCA5A5"><h3 style="color:#B91C1C">⛔ 違規（'+(violations.length+consViolations.length)+'筆）</h3>'+violations.map(itemHTML).join('')+consViolations.map(itemHTML).join('')+'</div>':'';
  var warnHTML=warnings.length>0
    ?'<div class="card" style="border:1px solid #FCD34D"><h3 style="color:#92400E">⚠️ 注意（'+warnings.length+'筆）需依規加給工資</h3>'+warnings.map(itemHTML).join('')+'</div>':'';

  return lookupHTML+header+lawCard+dangerHTML+warnHTML;
}
