// ══════════════════════════════════════════════════════════════
// EXPORT NEXT MONTH SCHEDULE TO EXCEL (matching reference format)
// ══════════════════════════════════════════════════════════════
function exportNextMonthExcel(){
  var nm=getNextMonthYear();
  var y=nm.y, m=nm.m;
  var dim=daysInMonth(y,m);
  var result=generateDraftSchedule();
  var draft=result.draft;
  var otPlan=result.otPlan||{};

  // OT dates lookup per employee
  var otDates={};
  currentEmps().forEach(function(emp){
    otDates[emp.id]={};
    if(otPlan[emp.id]){
      otPlan[emp.id].forEach(function(p){ otDates[emp.id][p.date]=p.hours; });
    }
  });

  function doExport(){
    var XLSX=window.XLSX;

    // Style helpers
    function st(fill,fontColor,bold,sz){
      return {font:{bold:!!bold,sz:sz||9,color:{rgb:fontColor||'000000'}},
              fill:{patternType:'solid',fgColor:{rgb:fill||'FFFFFF'}},
              alignment:{horizontal:'center',vertical:'center',wrapText:true},
              border:{top:{style:'thin',color:{rgb:'C4A882'}},bottom:{style:'thin',color:{rgb:'C4A882'}},left:{style:'thin',color:{rgb:'C4A882'}},right:{style:'thin',color:{rgb:'C4A882'}}}};
    }
    function cs(v,s){ return {v:v,t:'s',s:s}; }
    function cn(v,s){ return {v:v,t:'n',s:s}; }

    var S={
      title:   st('4A3728','FFFFFF',true,12),
      hdr:     st('EDE0D0','6B4C35',true,9),
      empName: st('F5EFE6','3D2B1F',true,10),
      shiftCode:st('D4B896','3D2B1F',true,9),
      work:    st('FFFFFF','2D5228',true,10),
      reiji:   st('FFB3B3','000000',true,10),
      kyuu:    st('FFFF00','000000',true,10),
      rin:     st('FF6600','000000',true,10),
      holiday: st('92D050','000000',true,10),
      off:     st('F5EFE6','C8C4B0',false,9),
      otOn:    st('FFE066','000000',true,10),
      otOff:   st('1A1A1A','1A1A1A',false,9),
      count:   st('EDE0D0','6B4C35',true,9),
      grpA:    st('FEF3C7','92400E',true,10),
      grpB:    st('EDE9FE','4C1D95',true,10),
      grpReg:  st('CCFBF1','0F766E',true,10),
      secHdr:  st('6B4C35','FFFFFF',true,11),
      weekday: st('F5EFE6','9CA38F',false,8),
      sat:     st('EEF2FF','1D4ED8',false,8),
      sun:     st('FFF0F0','CC0000',false,8),
      otHdr:   st('FEF3C7','92400E',true,9),
    };

    // Sort employees: A then B then 常日
    var sortedEmps=[].concat(
      currentEmps().filter(function(e){return e.group==='A'&&e.type==='day';}),
      currentEmps().filter(function(e){return e.group==='A'&&e.type==='night';}),
      currentEmps().filter(function(e){return e.group==='B'&&e.type==='day';}),
      currentEmps().filter(function(e){return e.group==='B'&&e.type==='night';}),
      currentEmps().filter(function(e){return e.group==='常日';})
    );

    var ws_data=[];
    var merges=[];
    var rowIdx=0;

    // ── Title row ──
    var titleRow=[cs(y+' 年/月  '+String(m+1).padStart(2,'0')+' 月 次月排班表',S.title)];
    for(var i=0;i<dim+4;i++) titleRow.push(cs('',S.title));
    ws_data.push(titleRow);
    merges.push({s:{r:0,c:0},e:{r:0,c:dim+4}});
    rowIdx++;

    // ── Day header row ──
    var dowNames=['日','一','二','三','四','五','六'];
    function makeHdrRow(){
      var r=[cs('班別',S.hdr),cs('工號',S.hdr),cs('姓名',S.hdr)];
      for(var d=1;d<=dim;d++){
        var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        var dow=new Date(ds+'T00:00:00').getDay();
        r.push(cs(d+'\n週'+dowNames[dow], dow===0?S.sun:dow===6?S.sat:S.weekday));
      }
      r.push(cs('出勤\n天數',S.hdr),cs('加班\n時數',S.hdr));
      return r;
    }

    // ════════════════════
    // SECTION 1: 正常班表
    // ════════════════════
    var secRow1=[cs('【 正 常 班 表 】',S.secHdr)];
    for(var i=0;i<dim+4;i++) secRow1.push(cs('',S.secHdr));
    ws_data.push(secRow1);
    merges.push({s:{r:rowIdx,c:0},e:{r:rowIdx,c:dim+4}});
    rowIdx++;

    ws_data.push(makeHdrRow());
    rowIdx++;

    // Group separators
    var lastGroup='';
    sortedEmps.forEach(function(emp){
      // Group header row
      if(emp.group!==lastGroup){
        lastGroup=emp.group;
        var gs=emp.group==='A'?S.grpA:emp.group==='B'?S.grpB:S.grpReg;
        var label=emp.group==='A'?'▶ A 班（二二制）':emp.group==='B'?'▶ B 班（二二制）':'▶ 常日班';
        var gRow=[cs(label,gs)];
        for(var i=0;i<dim+4;i++) gRow.push(cs('',gs));
        ws_data.push(gRow);
        merges.push({s:{r:rowIdx,c:0},e:{r:rowIdx,c:dim+4}});
        rowIdx++;
      }

      var row=[
        cs(emp.group+(emp.shiftCode?'\n'+emp.shiftCode:''),S.shiftCode),
        cs(emp.id||'',S.shiftCode),
        cs(emp.name,S.empName)
      ];
      var workCnt=0;
      for(var d=1;d<=dim;d++){
        var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        var key=ds+'-'+emp.id;
        var sh=draft[key]||'OFF';
        var calEntry=OFFICIAL_CALENDAR[ds];
        var dayType=calEntry?calEntry.type:'工作日';
        var pRule=emp.shiftCode?getScheduleRule(emp,ds):null;
        var pStatus=pRule?pRule.status:null;
        var cell;
        if(sh!=='OFF'){
          cell=cn(10,S.work);
          workCnt++;
        } else {
          if(dayType==='例假日'||pStatus==='例')        cell=cs('例',S.reiji);
          else if(dayType==='休息日'||pStatus==='休')   cell=cs('休',S.kyuu);
          else if(pStatus==='輪')                       cell=cs('輪',S.rin);
          else if(dayType==='國定假日'||dayType==='補假') cell=cs('●'+(m+1)+'/'+(+ds.slice(8)),S.holiday);
          else cell=cs('',S.off);
        }
        row.push(cell);
      }
      row.push(cn(workCnt,S.count));
      row.push(cs('',S.count));
      ws_data.push(row);
      rowIdx++;
    });

    // Daily headcount row (正常班表)
    var cntRow1=[cs('出勤\n人數',S.count),cs('',S.count),cs('',S.count)];
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var cnt=sortedEmps.filter(function(e){
        var k=ds+'-'+e.id; return draft[k]&&draft[k]!=='OFF';
      }).length;
      cntRow1.push(cn(cnt,S.count));
    }
    cntRow1.push(cs('',S.count),cs('',S.count));
    ws_data.push(cntRow1);
    rowIdx++;

    // Spacer
    ws_data.push([]);
    rowIdx++;

    // ════════════════════
    // SECTION 2: 加班班表
    // ════════════════════
    var secRow2=[cs('【 加 班 班 表 】',S.secHdr)];
    for(var i=0;i<dim+4;i++) secRow2.push(cs('',S.secHdr));
    ws_data.push(secRow2);
    merges.push({s:{r:rowIdx,c:0},e:{r:rowIdx,c:dim+4}});
    rowIdx++;

    ws_data.push(makeHdrRow());
    rowIdx++;

    lastGroup='';
    sortedEmps.forEach(function(emp){
      if(emp.group!==lastGroup){
        lastGroup=emp.group;
        var gs=emp.group==='A'?S.grpA:emp.group==='B'?S.grpB:S.grpReg;
        var label=emp.group==='A'?'▶ A 班':emp.group==='B'?'▶ B 班':'▶ 常日班';
        var gRow=[cs(label,gs)];
        for(var i=0;i<dim+4;i++) gRow.push(cs('',gs));
        ws_data.push(gRow);
        merges.push({s:{r:rowIdx,c:0},e:{r:rowIdx,c:dim+4}});
        rowIdx++;
      }

      var row=[
        cs(emp.group+(emp.shiftCode?'\n'+emp.shiftCode:''),S.shiftCode),
        cs(emp.id||'',S.shiftCode),
        cs(emp.name,S.empName)
      ];
      var otHrs=0;
      for(var d=1;d<=dim;d++){
        var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        var hasOT=otDates[emp.id]&&otDates[emp.id][ds];
        if(hasOT){
          row.push(cs('加班\n10',S.otOn));
          otHrs+=10;
        } else {
          row.push(cs('',S.otOff));
        }
      }
      row.push(cs('',S.count));
      row.push(cn(otHrs, otHrs>0?S.otHdr:S.count));
      ws_data.push(row);
      rowIdx++;
    });

    // Daily OT headcount
    var cntRow2=[cs('出勤\n人數',S.count),cs('',S.count),cs('',S.count)];
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var cnt=sortedEmps.filter(function(e){
        return otDates[e.id]&&otDates[e.id][ds];
      }).length;
      cntRow2.push(cn(cnt,S.count));
    }
    cntRow2.push(cs('',S.count),cs('',S.count));
    ws_data.push(cntRow2);

    // ── Build worksheet ──
    var ws=XLSX.utils.aoa_to_sheet(ws_data);
    ws['!merges']=merges;

    // Column widths
    var colW=[{wch:7},{wch:8},{wch:9}];
    for(var i=0;i<dim;i++) colW.push({wch:4.5});
    colW.push({wch:6},{wch:6});
    ws['!cols']=colW;

    // Row heights (give data rows more height)
    var rowH=[];
    for(var i=0;i<ws_data.length;i++) rowH.push({hpt:i===0?22:i===1?24:18});
    ws['!rows']=rowH;

    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,y+'年'+(m+1)+'月班表');
    XLSX.writeFile(wb, y+'年'+String(m+1).padStart(2,'0')+'月_排班表.xlsx');
  }

  if(!window.XLSX){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doExport;
    document.head.appendChild(s);
  } else {
    doExport();
  }
}

function getNextMonthYear(){
  var m=state.month+1, y=state.year;
  if(m>11){m=0;y++;}
  return {y:y,m:m};
}

function generateDraftSchedule(){
  var nm=getNextMonthYear();
  var y=nm.y, m=nm.m;
  var dim=daysInMonth(y,m);
  var draft={};
  var issues=[];   // [{date,emp,reason,level}]

  currentEmps().forEach(function(emp){
    var otUsedNext=0;  // projected OT for next month
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var key=ds+'-'+emp.id;
      var calEntry=OFFICIAL_CALENDAR[ds];
      var dayType=calEntry?calEntry.type:'工作日';
      var dow=new Date(ds+'T00:00:00').getDay();

      // ── 常日班 ──
      if(emp.group==='常日'){
        if(dayType==='例假日'||dayType==='休息日'||dayType==='國定假日'||dayType==='補假'){
          draft[key]='OFF';
        } else {
          draft[key]='REGULAR';
        }
        continue;
      }

      // ── A/B班：依 SHIFT_SCHEDULES[emp.shiftCode] 個人行事曆判斷 ──
      var duty=dutyGroup(ds);

      // Check personal shift code schedule
      var pRule=emp.shiftCode?getScheduleRule(emp,ds):null;
      var pStatus=pRule?pRule.status:null;

      // isWorkDay：依個人班制行事曆判斷（10/8/◎開頭 = 當班）
      var isWorkDay = (pStatus==='10' || pStatus==='8' || pStatus==='◎');
      if(!pStatus) isWorkDay = (emp.group === duty);

      // 例假日 → 絕對不可排
      if(dayType==='例假日'||pStatus==='例'){
        draft[key]='OFF';
        if(isWorkDay){
          issues.push({date:ds,emp:emp,level:'info',
            reason:emp.name+' 原本上班但遇例假日，自動調為休假'});
        }
        continue;
      }

      // 休息日 → 不可強制安排
      if(dayType==='休息日'||pStatus==='休'){
        draft[key]='OFF';
        if(isWorkDay){
          issues.push({date:ds,emp:emp,level:'info',
            reason:emp.name+' 休息日自動標為休假（不可強制加班）'});
        }
        continue;
      }

      if(!isWorkDay){
        // Off-duty day for this group
        if(pStatus==='輪'){
          draft[key]='OFF';
        } else if(dayType==='國定假日'||dayType==='補假'||pStatus==='◎'){
          draft[key]='OFF';
        } else {
          draft[key]='OFF';
        }
        continue;
      }

      // Normal work day
      var sh=emp.type==='night'?(emp.group==='A'?'NIGHT_A':'NIGHT_B'):(emp.group==='A'?'DAY_A':'DAY_B');

      // Check national holiday
      if(dayType==='國定假日'||dayType==='補假'||pStatus==='◎'){
        draft[key]=sh;  // Can work but needs extra pay
        issues.push({date:ds,emp:emp,level:'warning',
          reason:emp.name+' '+ds+' 為國定假日/補假，出勤需加給工資（勞基法第39條）'});
        continue;
      }

      // Check personal schedule 輪休
      if(pStatus==='輪'){
        draft[key]='OFF';
        issues.push({date:ds,emp:emp,level:'info',
          reason:emp.name+' '+ds+' 班制為輪休日，自動安排休假'});
        continue;
      }

      draft[key]=sh;
    }
  });

  // Check consecutive days violation (含加班/manual/draft 來源)
  currentEmps().forEach(function(emp){
    var consec=0;
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      // 用新的 helper（涵蓋班別+manualShift+state.records OT+draftOT）
      var working = (typeof isEmpWorkingOrOnOT === 'function')
        ? isEmpWorkingOrOnOT(emp.id, ds)
        : (function(){var key=ds+'-'+emp.id;return draft[key]&&draft[key]!=='OFF';})();
      if(working) consec++; else consec=0;
      if(consec>=7){
        issues.push({date:ds,emp:emp,level:'danger',
          reason:emp.name+' 連續出勤已達'+consec+'天（含班別、預排加班、手動加班），違反勞基法第36條，請手動調整'});
      }
    }
  });

  // ══════════════════════════════════════════════════════
  // 預排加班（依個人班制行事曆）
  //
  // 判斷標準（以 SHIFT_SCHEDULES 個人班制為準）：
  //   10 / 8  → 正常當班，不疊加班
  //   例      → 例假日，絕對不可排
  //   休      → 休息日，不可強制排
  //   輪      → 輪休日，✅ 可加班
  //   ◎      → 調移國定假日，⚠️ 可加班但需加給工資
  //   無班制  → 依官方行事曆，工作日=當班，其餘跳過
  //
  // 額外保護：排了這天後整段不得有7連班
  // ══════════════════════════════════════════════════════
  var OT_HOURS_PER_SESSION = 10;
  var otPlan = {};

  currentEmps().forEach(function(emp){
    otPlan[emp.id] = [];
    if(!state.otPlanEmps[emp.id]) return;

    var limit = getOtLimit(emp.id);
    var allocated = 0;

    // ── 依 weekendOtMode 決定排程策略 ──
    // 'off' = 不避開週末（單階段全部排）
    // 'soft' = 平日優先、不夠才排週末（警告）
    // 'strict' = 完全禁止週末（只排平日）
    var weekendMode = state.weekendOtMode || 'soft';
    var maxPass = weekendMode==='off' ? 1 : 2;
    for(var pass=0; pass<maxPass && allocated<limit; pass++){
    for(var d=1; d<=dim && allocated<limit; d++){
      var ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var dowOT = new Date(ds+'T00:00:00').getDay();
      var isWeekendOT = (dowOT===0 || dowOT===6);
      // 'off' 模式：所有日子都納入（單一階段）
      // 'strict' 模式：永遠跳過週末
      if(weekendMode==='strict' && isWeekendOT) continue;
      // 'soft' 模式：階段 0 跳週末、階段 1 只跑週末
      if(weekendMode==='soft'){
        if(pass===0 && isWeekendOT) continue;
        if(pass===1 && !isWeekendOT) continue;
      }

      // ── 依個人班制判斷 ──
      var canOT = false;
      var effectiveCode = getEffectiveShiftCode(emp.id, ds);
      if(effectiveCode && SHIFT_SCHEDULES[effectiveCode]){
        var status = SHIFT_SCHEDULES[effectiveCode][ds];
        if(!status) continue;                          // 無資料，跳過
        if(status==='例') continue;                    // 例假日，不可
        if(status.startsWith('休')) continue;          // 休息日，不可
        if(status==='輪') canOT = true;                // 輪休日，✅ 可加班
        if(status.startsWith('◎')) canOT = true;      // 調移假日，可但需加給
        if(status==='10'||status==='8') continue;      // 當班，不疊加班
      } else {
        // 無班制：依官方行事曆，只排輪休（OFF）且非例/休的日期
        var calEntry = OFFICIAL_CALENDAR[ds];
        var dayType = calEntry ? calEntry.type : '工作日';
        if(dayType==='例假日'||dayType==='休息日') continue;
        var key = ds+'-'+emp.id;
        if(!draft[key]||draft[key]!=='OFF') continue;
        canOT = true;
      }
      if(!canOT) continue;

      // ── 7連班保護 ──
      function isWorkOrOT2(dateStr){
        if(typeof isEmpWorkingOrOnOT === 'function' && isEmpWorkingOrOnOT(emp.id, dateStr)) return true;
        return otPlan[emp.id].some(function(p){return p.date===dateStr;});
      }
      var before=0;
      for(var i=1;i<=6;i++){
        var prev=new Date(ds+'T00:00:00');
        prev.setDate(prev.getDate()-i);
        var ps=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
        if(isWorkOrOT2(ps)) before++; else break;
      }
      var after=0;
      for(var i=1;i<=6;i++){
        var nxt=new Date(ds+'T00:00:00');
        nxt.setDate(nxt.getDate()+i);
        var ns=nxt.getFullYear()+'-'+String(nxt.getMonth()+1).padStart(2,'0')+'-'+String(nxt.getDate()).padStart(2,'0');
        if(isWorkOrOT2(ns)) after++; else break;
      }
      if(before+1+after>=7) continue;  // 會形成7連班，跳過
      // 偏好提醒：避開員工希望避開的日子（軟限制 — 自動排不選，但手動可加）
      if(typeof getPreferenceOnDate === 'function' && getPreferenceOnDate(emp.id, ds)) continue;

      // ── 通過，加入預排 ──
      var hrs = Math.min(OT_HOURS_PER_SESSION, limit-allocated);
      otPlan[emp.id].push({date:ds, hours:hrs});
      allocated += hrs;
      // soft 模式階段 2（週末補排）才跳警告
      if(weekendMode==='soft' && pass===1){
        issues.push({date:ds, emp:emp, level:'warning',
          reason:emp.name+' '+ds+'（週'+['日','一','二','三','四','五','六'][dowOT]+'）平日加班額度不足，自動排到週末（請考慮人手調度）'});
      }
    }
    }
  });

  return {draft:draft, issues:issues, y:y, m:m, otPlan:otPlan};
}

function applyDraftToNextMonth(draft, y, m, otPlan){
  makeBackup('套用次月草稿前');
  var dim=daysInMonth(y,m);
  var d1=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var d2=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');

  // ── 清掉「本次次月」範圍內所有「自動類紀錄」──
  // autoOT=true 表示系統/草稿產生的（預排加班、預排請假草稿）
  // 手動建立的紀錄（autoOT=false 或 undefined）保留尊重使用者
  state.records=state.records.filter(function(r){
    var inRange = r.date>=d1 && r.date<=d2;
    return !(inRange && r.autoOT===true);
  });

  // 套用班別 draft（覆寫，不重複）
  currentEmps().forEach(function(emp){
    for(var d=1;d<=dim;d++){
      var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var key=ds+'-'+emp.id;
      if(draft[key]) state.manualShift[key]=draft[key];
    }
  });

  // 套用 OT plan
  if(otPlan){
    currentEmps().forEach(function(emp){
      var plan=otPlan[emp.id]||[];
      plan.forEach(function(ot){
        // 只套本次次月範圍內
        if(ot.date<d1||ot.date>d2) return;
        state.records.push({
          id:Date.now()+Math.random(),
          empId:emp.id,date:ot.date,
          type:'OT',leaveType:'',hours:ot.hours,
          note:'預排加班',autoOT:true
        });
      });
    });
  }

  // 套用手動 draftOT（限本次次月日期）
  Object.keys(state.draftOT).forEach(function(k){
    var parts=k.split('-');
    var empId=Number(parts[0]);
    var dateStr=parts.slice(1).join('-');
    if(dateStr<d1||dateStr>d2) return; // 跨月 key 不處理
    // 移除剛剛範圍內可能已套的同 empId+date OT，避免疊加
    state.records=state.records.filter(function(r){
      return !(r.empId===empId&&r.date===dateStr&&r.type==='OT'&&r.autoOT===true);
    });
    state.records.push({id:Date.now()+Math.random(),empId:empId,date:dateStr,type:'OT',leaveType:'',hours:state.draftOT[k],note:'預排加班（手動）',autoOT:true});
  });

  // 套用手動 draftLeave（限本次次月日期）
  Object.keys(state.draftLeave).forEach(function(k){
    var parts=k.split('-');
    var empId=Number(parts[0]);
    var dateStr=parts.slice(1).join('-');
    if(dateStr<d1||dateStr>d2) return;
    var lv=state.draftLeave[k];
    // 移除已有的同 empId+date Leave（autoOT=true 的）
    state.records=state.records.filter(function(r){
      return !(r.empId===empId&&r.date===dateStr&&r.type==='LEAVE'&&r.autoOT===true);
    });
    state.records.push({id:Date.now()+Math.random(),empId:empId,date:dateStr,type:'LEAVE',leaveType:lv.type,hours:lv.hours,note:'預排請假（次月班表）',autoOT:true});
  });

  // 清掉本次次月範圍內的 draft 暫存（避免下次重複套用）
  Object.keys(state.draftOT).forEach(function(k){
    var dateStr=k.split('-').slice(1).join('-');
    if(dateStr>=d1&&dateStr<=d2) delete state.draftOT[k];
  });
  Object.keys(state.draftLeave).forEach(function(k){
    var dateStr=k.split('-').slice(1).join('-');
    if(dateStr>=d1&&dateStr<=d2) delete state.draftLeave[k];
  });

  state.autoSchedApplied=true;
  state.year=y; state.month=m; state.view='calendar';
  render();
}

// Calculate total draft OT hours for an employee in next month
function getDraftOtHours(empId){
  var result=generateDraftSchedule();
  var y=result.y, m=result.m;
  var d1=y+'-'+String(m+1).padStart(2,'0')+'-01';
  var dim=daysInMonth(y,m);
  var d2=y+'-'+String(m+1).padStart(2,'0')+'-'+String(dim).padStart(2,'0');
  // Pre-planned OT from otPlan
  var planHours=(result.otPlan[empId]||[]).reduce(function(a,p){
    var k=empId+'-'+p.date;
    return a+(state.draftCancelOT&&state.draftCancelOT[k]?0:p.hours);
  },0);
  // Manual draft OT
  var manualHours=Object.keys(state.draftOT).filter(function(k){
    return k.startsWith(empId+'-');
  }).reduce(function(a,k){return a+Number(state.draftOT[k]||0);},0);
  return planHours+manualHours;
}
function draftToggleOT(empId, dateStr){
  var k = empId+'-'+dateStr;
  if(state.draftLeave[k]) delete state.draftLeave[k];

  // Block OT on 例/休/休. days (考量分段班制 nextMonthShift)
  var emp=currentEmps().find(function(e){return e.id===empId;});
  var effCode=getEffectiveShiftCode(empId, dateStr);
  if(emp&&effCode&&SHIFT_SCHEDULES[effCode]){
    var st=SHIFT_SCHEDULES[effCode][dateStr];
    if(st==='例'||st==='休.'){
      alert('⛔ '+dateStr+' 為「'+st+'」（班制 '+effCode+'），不可安排加班');
      return;
    }
  } else {
    var calEntry=OFFICIAL_CALENDAR[dateStr];
    var dayType=calEntry?calEntry.type:'工作日';
    if(dayType==='例假日'||dayType==='休息日'){
      alert('⛔ '+dateStr+' 為「'+dayType+'」，不可安排加班');
      return;
    }
  }

  // ── 偏好提醒（員工希望避開此日）──
  if(!state.draftOT[k]){
    var prefHit = getPreferenceOnDate(empId, dateStr);
    if(prefHit){
      var empPF = currentEmps().find(function(e){return e.id===empId;});
      var namePF = empPF ? empPF.name : '員工';
      if(!confirm('🔔 員工偏好提醒\n\n'+namePF+' 在 '+dateStr+' 標記為「希望避開」'+(prefHit.reason?'：'+prefHit.reason:'')+'\n（區間 '+prefHit.from+' ~ '+prefHit.to+'）\n\n仍要安排加班嗎？')){
        return;
      }
    }
  }
  // ── 7 連班保護（不論是否預排，都先檢查若要新增）──
  if(!state.draftOT[k]){
    var consec = computeConsecutiveDays(empId, dateStr);
    if(consec >= 7){
      var empCK = currentEmps().find(function(e){return e.id===empId;});
      var nameCK = empCK ? empCK.name : '員工';
      if(!confirm('⚠️ 勞基法警告\n\n'+nameCK+' 若 '+dateStr+' 加班，會形成連續上班 '+consec+' 天，違反勞基法第36條（7休1原則）。\n\n仍要強制加班嗎？')){
        return;
      }
    }
  }

  // Check if this date is from otPlan (pre-planned)
  var result=generateDraftSchedule();
  var isPrePlanned=result.otPlan[empId]&&result.otPlan[empId].some(function(p){return p.date===dateStr;});

  if(isPrePlanned){
    if(!state.draftCancelOT) state.draftCancelOT={};
    if(state.draftCancelOT[k]) delete state.draftCancelOT[k];
    else state.draftCancelOT[k]=true;
  } else {
    if(state.draftOT[k]){
      delete state.draftOT[k];
    } else {
      // Ask for hours
      var emp2=currentEmps().find(function(e){return e.id===empId;});
      var name2=emp2?emp2.name:'員工';
      var limit=getOtLimit(empId);
      var current=getDraftOtHours(empId);
      var hoursInput=prompt(name2+' '+dateStr+'\n加班時數（預設10小時）：','10');
      if(hoursInput===null) return; // cancelled
      var hours=parseInt(hoursInput,10);
      if(isNaN(hours)||hours<=0||hours>24){alert('請輸入有效時數（1-24）');return;}
      // Check limit
      if(limit>0 && current+hours > limit){
        if(!confirm('⚠️ '+name2+' 加班上限 '+limit+'h，目前已排 '+current+'h，再加 '+hours+'h 將超過上限（共 '+(current+hours)+'h）\n確定要新增？')){
          return;
        }
      }
      state.draftOT[k]=hours;
    }
  }
  render();
}

function draftEditOT(empId, dateStr, isPrePlanned){
  var k=empId+'-'+dateStr;
  var cur=state.draftOT[k]||(isPrePlanned?10:10);
  var choice=confirm('加班 '+dateStr+'\n目前：'+cur+'h\n\n確定=修改時數　取消=取消加班');
  if(choice){
    // Modify hours
    var h=prompt('輸入新的加班時數：', String(cur));
    if(h===null) return;
    var hours=parseInt(h,10);
    if(isNaN(hours)||hours<=0||hours>24){alert('請輸入有效時數（1-24）');return;}
    if(isPrePlanned){
      // Store override in draftOT
      if(!state.draftCancelOT) state.draftCancelOT={};
      delete state.draftCancelOT[k];
      state.draftOT[k]=hours;
    } else {
      state.draftOT[k]=hours;
    }
  } else {
    // Cancel OT
    if(isPrePlanned){
      if(!state.draftCancelOT) state.draftCancelOT={};
      state.draftCancelOT[k]=true;
      delete state.draftOT[k];
    } else {
      delete state.draftOT[k];
    }
  }
  render();
}

function draftSetLeave(empId, dateStr, leaveType){
  var k = empId+'-'+dateStr;
  if(state.draftLeave[k] && state.draftLeave[k].type===leaveType) delete state.draftLeave[k];
  else state.draftLeave[k]={type:leaveType, hours:10};
  render();
}

function draftClearCell(empId, dateStr){
  var k = empId+'-'+dateStr;
  delete state.draftOT[k];
  delete state.draftLeave[k];
  if(state.draftCancelOT) delete state.draftCancelOT[k];
  render();
}

function renderOverview(){
  var dim=daysInMonth(state.year,state.month);
  var warehouses=[
    {key:'receiving', label:'收料倉', color:'#F59E0B', bg:'#FEF3C7'},
    {key:'finished',  label:'成品倉', color:'#10B981', bg:'#D1FAE5'},
  ];

  function calcWarehouseStats(wKey){
    var emps=state.warehouseEmployees[wKey]||[];
    if(emps.length===0) return null;

    var totalPossible=0, totalWork=0, totalOT=0, totalLeave=0;
    var byGroup={A:{work:0,total:0},B:{work:0,total:0},常日:{work:0,total:0}};

    emps.forEach(function(emp){
      for(var d=1;d<=dim;d++){
        var ds=toDateStr(state.year,state.month,d);
        var sh=getShift(emp,ds).shift;
        totalPossible++;
        var g=emp.group==='常日'?'常日':(emp.group==='A'?'A':'B');
        byGroup[g].total++;
        if(sh!=='OFF'){
          totalWork++;
          byGroup[g].work++;
        }
      }
    });

    // OT & leave records this month
    var d1=toDateStr(state.year,state.month,1);
    var d2=toDateStr(state.year,state.month,dim);
    // Use per-warehouse records (share state.records but filter by empId)

    });
    totalOT=wRecs.filter(function(r){return r.type==='OT';}).reduce(function(a,r){return a+Number(r.hours||0);},0);
    totalLeave=wRecs.filter(function(r){return r.type==='LEAVE';}).reduce(function(a,r){return a+Number(r.hours||0);},0);

    var attendRate=totalPossible>0?Math.round(totalWork/totalPossible*100):0;
    var totalWorkHours=totalWork*10;
    var otRate=totalWorkHours>0?Math.round(totalOT/totalWorkHours*100):0;
    var leaveRate=totalWorkHours>0?Math.round(totalLeave/totalWorkHours*100):0;

    return {emps:emps.length,totalPossible,totalWork,totalOT,totalLeave,attendRate,otRate,leaveRate,byGroup};
  }

  function kpiCard(label,val,unit,color,bg,pct){
    var barW=Math.min(pct||0,100);
    var barColor=pct>=90?'#16A34A':pct>=70?'#D97706':'#DC2626';
    return '<div style="background:'+bg+';border-radius:10px;padding:12px 14px;border:1px solid '+color+'44;flex:1;min-width:120px">'

      +(pct!==undefined?'<div style="background:#E8E0D0;border-radius:3px;height:5px;margin-top:6px"><div style="background:'+barColor+';height:100%;border-radius:3px;width:'+barW+'%"></div></div>':'')

  function groupBar(label,work,total,color){

    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'

  var sections=warehouses.map(function(w){

      +'</div>'

    +'</div>';

    return '<div class="card" style="border:2px solid '+w.color+'44">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<div style="width:12px;height:12px;border-radius:50%;background:'+w.color+'"></div>'
          +'<h3 style="margin:0;color:'+w.color+'">'+w.label+'</h3>'
        +'</div>'
        +'<div style="font-size:11px;color:#9CA38F">共 '+s.emps+' 人 ｜ '+state.year+'年'+(state.month+1)+'月</div>'
      +'</div>'
      // KPI cards
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'
        +kpiCard('出勤率', s.attendRate+'%', '', s.attendRate>=80?'#16A34A':'#DC2626', s.attendRate>=80?'#DCFCE7':'#FEE2E2', s.attendRate)
        +kpiCard('加班工時', s.totalOT+'h', '', '#D97706', '#FEF3C7')
        +kpiCard('加班率', s.otRate+'%', '', s.otRate>20?'#DC2626':'#D97706', s.otRate>20?'#FEE2E2':'#FEF3C7', s.otRate)
        +kpiCard('請假工時', s.totalLeave+'h', '', '#7C3AED', '#EDE9FE')
      +'</div>'
      // Group breakdown
      +'<div style="font-size:11px;font-weight:700;color:#6B4C35;margin-bottom:8px">班別出勤率</div>'
      +groupBar('A班', s.byGroup.A.work, s.byGroup.A.total, '#F59E0B')
      +groupBar('B班', s.byGroup.B.work, s.byGroup.B.total, '#A78BFA')
      +groupBar('常日', s.byGroup.常日.work, s.byGroup.常日.total, '#34D399')
    +'</div>';
  }).join('');

  // Combined totals
  var allEmps=(state.warehouseEmployees.receiving||[]).concat(state.warehouseEmployees.finished||[]);
  var allPossible=0,allWork=0,allOT=0,allLeave=0;
  var d1=toDateStr(state.year,state.month,1);
  var d2=toDateStr(state.year,state.month,dim);
  allEmps.forEach(function(emp){
    for(var d=1;d<=dim;d++){
      var ds=toDateStr(state.year,state.month,d);
      var sh=getShift(emp,ds).shift;

      if(sh!=='OFF') allWork++;

  });
  var allIds=allEmps.map(function(e){return e.id;});
  var allRecs=state.records.filter(function(r){return allIds.indexOf(r.empId)>=0&&r.date>=d1&&r.date<=d2;});
  allOT=allRecs.filter(function(r){return r.type==='OT';}).reduce(function(a,r){return a+Number(r.hours||0);},0);
  allLeave=allRecs.filter(function(r){return r.type==='LEAVE';}).reduce(function(a,r){return a+Number(r.hours||0);},0);
  var allAttend=allPossible>0?Math.round(allWork/allPossible*100):0;

  return '<div style="background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:12px;padding:14px;margin-bottom:14px">'

function handleCalendarImport(file){
  if(!file) return;
  if(!file.name.match(/\.xlsx?$/i)){
    state.calendarImportLog={ok:false,msg:'❌ 請上傳 .xlsx 格式的 Excel 檔案'};
    render(); return;
  }
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      if(!window.XLSX){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload=function(){ parseCalendarXlsx(e.target.result, file.name); };
        document.head.appendChild(s);
      } else {
        parseCalendarXlsx(e.target.result, file.name);
      }
    }catch(err){
      state.calendarImportLog={ok:false,msg:'❌ 讀取失敗：'+err.message};
      render();
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseCalendarXlsx(buffer, fileName){
  try{
    var XLSX=window.XLSX;
    var wb=XLSX.read(buffer,{type:'array',cellDates:true});
    var newCal={};
    var imported=0;
    var errors=[];

    // Sheet name mapping
    var sheetMap={
      '常日班':     {type:'regular'},
      '二二制A班':  {type:'shift'},
      '二二制B班':  {type:'shift'},
    };

    wb.SheetNames.forEach(function(name){
      if(!sheetMap[name]) return;
      var ws=wb.Sheets[name];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd'});

      // Find date row and data rows
      var dateRowIdx=-1;
      for(var i=0;i<rows.length;i++){
        if(rows[i]&&rows[i][0]==='日期'||rows[i]&&String(rows[i][0]).includes('日期')){
          dateRowIdx=i; break;
        }
      }
      if(dateRowIdx===-1){
        // Try to find row where cells look like dates
        for(var i=0;i<rows.length&&i<10;i++){
          var hasDate=false;
          for(var j=1;j<rows[i].length;j++){
            var v=rows[i][j];
            if(v&&String(v).match(/^\d{4}-\d{2}-\d{2}/)){hasDate=true;break;}
          }
          if(hasDate){dateRowIdx=i;break;}
        }
      }
      if(dateRowIdx===-1){errors.push(name+': 找不到日期列');return;}

      var dateRow=rows[dateRowIdx];
      var colDates={};
      for(var c=1;c<dateRow.length;c++){
        var dv=dateRow[c];
        if(!dv) continue;
        var ds=String(dv);
        // Handle Excel date string formats
        if(ds.match(/^\d{4}-\d{2}-\d{2}/)) colDates[c]=ds.slice(0,10);
        else if(ds.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)){
          var parts=ds.split('/');
          colDates[c]=parts[2]+'-'+String(parts[0]).padStart(2,'0')+'-'+String(parts[1]).padStart(2,'0');
        }
      }

      // Parse each band row
      for(var r=dateRowIdx+1;r<rows.length;r++){
        var row=rows[r];
        if(!row||!row[0]) continue;
        var bandName=String(row[0]).trim();
        if(bandName==='日期'||bandName==='星期'||bandName==='出勤人數'||!bandName) continue;

        // Regular schedule bands
        Object.keys(colDates).forEach(function(c){
          var ds=colDates[c];
          if(!ds) return;
          var val=row[c]!==undefined&&row[c]!==null?String(row[c]).trim():'';
          if(!newCal[ds]) newCal[ds]={};

          // Determine day type from value
          var dayType='工作日';
          var level='ok';
          if(val==='例'){dayType='例假日';level='forbidden';}
          else if(val==='休'||val.startsWith('休')){dayType='休息日';level='restricted';}
          else if(val&&val.startsWith('●')){
            var hname=val.replace('●','');
            dayType='國定假日';level='warning';
            if(!newCal[ds].holidayName) newCal[ds].holidayName=hname;
          }
          else if(val&&val.startsWith('◎')){dayType='補假';level='warning';}
          else if(val==='8'||val==='10'){dayType='工作日';level='ok';}

          // Only update if this is the regular sheet (most authoritative)
          if(name==='常日班'){
            newCal[ds].type=dayType;
            newCal[ds].level=level;
            newCal[ds].regularHours=val==='8'?8:val==='10'?10:0;
            imported++;
          } else if(!newCal[ds].type){
            // Fill from shift sheet if not set
            newCal[ds].type=dayType;
            newCal[ds].level=level;
            imported++;
          }
        });
      }
    });

    if(Object.keys(newCal).length===0){
      state.calendarImportLog={ok:false,msg:'❌ 未讀取到任何行事曆資料，請確認工作表名稱（常日班/二二制A班/二二制B班）'};
      render(); return;
    }

    // Merge into OFFICIAL_CALENDAR
    var updated=0;
    Object.keys(newCal).forEach(function(ds){
      if(JSON.stringify(OFFICIAL_CALENDAR[ds])!==JSON.stringify(newCal[ds])) updated++;
      OFFICIAL_CALENDAR[ds]=newCal[ds];
    });

    state.calendarImportLog={
      ok:true,
      msg:'✅ 匯入成功！更新 '+Object.keys(newCal).length+' 天行事曆資料（'+updated+' 天有變動）'+(errors.length>0?'，警告：'+errors.join('；'):'')
    };
    render();
  }catch(err){
    state.calendarImportLog={ok:false,msg:'❌ 解析失敗：'+err.message};
    render();
  }
}

// ══════════════════════════════════════════════════════════════
function exportPersonalExcel(empId){
  var emp = currentEmps().find(function(e){return e.id===empId;});
  if(!emp) return;
  var dim = daysInMonth(state.year, state.month);
  var es  = calcEmpStats(emp);

  // Build CSV content (UTF-8 BOM for Excel)
  var header = '1425收料倉出勤系統 - 個人班表';
  var info   = emp.name + '　' + state.year + '年' + (state.month+1) + '月　' + emp.group + '班　' + (SHIFTS[emp.defShift]||SHIFTS.OFF).label;
  var cols   = ['日期','星期','班別','上班時間','加班','請假','備註'];

  var rows = [];
  for(var d=1; d<=dim; d++){
    var ds   = toDateStr(state.year, state.month, d);
    var dow  = new Date(ds+'T00:00:00').getDay();
    var shObj= getShift(emp, ds);
    var sh   = shObj.shift;
    var s    = SHIFTS[sh];
    var recs = getDateRecords(empId, ds);
    var otRecs = recs.filter(function(r){return r.type==='OT';});
    var lvRecs = recs.filter(function(r){return r.type==='LEAVE';});
    var isWknd = dow===0||dow===6;
    var isHol  = isHoliday(ds);

    var dayLabel   = d + ' (' + '日一二三四五六'[dow] + ')';
    var shiftLabel = sh==='OFF' ? (isHol?(HOLIDAY_NAMES[ds]||'國定假日'):isWknd?'週末休假':'休假') : s.label;
    var timeLabel  = sh==='OFF' ? '—' : SHIFT_TIMES[sh];
    var otLabel    = otRecs.length>0 ? otRecs.map(function(r){return r.hours+'h'+(r.note?' '+r.note:'');}).join(' / ') : '';
    var lvLabel    = lvRecs.length>0 ? lvRecs.map(function(r){return (r.leaveType||'請假')+' '+r.hours+'h';}).join(' / ') : '';
    var noteLabel  = shObj.manual ? '手動排班' : '';

    rows.push([
      ds,
      '週'+'日一二三四五六'[dow],
      shiftLabel,
      timeLabel,
      otLabel,
      lvLabel,
      noteLabel
    ]);
  }

  // Summary rows
  var summaryRows = [
    [],
    ['統計項目','數值','','','','',''],
    ['出勤天數', es.workDays+'天','','','','',''],
    ['休假天數', es.offDays+'天','','','','',''],
    ['總工時',   es.totalHours+'小時','','','','',''],
    ['加班工時', es.otHours+'h','','','','',''],
    ['加班工時', es.otHours+'小時','','','','',''],
    ['請假工時', es.leaveHours+'h','','','','',''],
    ['請假工時', es.leaveHours+'小時','','','','',''],
  ];

  // Assemble CSV
  function csvRow(arr){
    return arr.map(function(v){
      var s = String(v||'');
      if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0)
        return '"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(',');
  }

  var lines = [
    csvRow([header]),
    csvRow([info]),
    csvRow([]),
    csvRow(cols)
  ];
  rows.forEach(function(r){ lines.push(csvRow(r)); });
  summaryRows.forEach(function(r){ lines.push(csvRow(r)); });

  var bom  = '\uFEFF';
  var blob = new Blob([bom + lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = emp.name + '_' + state.year + String(state.month+1).padStart(2,'0') + '_班表.csv';
  a.click();
  URL.revokeObjectURL(url);
}

var _modalType='OT';
function setModalType(t){
  _modalType=t;
  var btnOT=document.getElementById('btn-ot');
  var btnLV=document.getElementById('btn-leave');
  var lv=document.getElementById('leaveTypeSelect');
  var sub=document.getElementById('submitRecBtn');
  if(btnOT){btnOT.className=t==='OT'?'active-ot':'';}
  if(btnLV){btnLV.className=t==='LEAVE'?'active-leave':'';}
  if(lv){lv.style.display=t==='LEAVE'?'block':'none';}
  if(sub){sub.style.background=t==='OT'?'linear-gradient(135deg,#EF4444,#F97316)':'linear-gradient(135deg,#EC4899,#F472B6)';sub.textContent='登記'+(t==='OT'?'加班':'請假');}
}
function submitRecord(){
  if(!state.modalData)return;
  var h=parseFloat(document.getElementById('hoursInput').value);
  var note=document.getElementById('noteInput').value;
  var lt=_modalType==='LEAVE'?document.getElementById('leaveTypeSelect').value:'';
  addRecord(state.modalData.empId,state.modalData.date,_modalType,lt,h,note);
  document.getElementById('hoursInput').value='';
  document.getElementById('noteInput').value='';
}

}

<script>
// 表格十字架高亮：監聽所有 table 內 td/th hover
(function(){
  var lastCells = [];
  function clearCross(){
    lastCells.forEach(function(el){
      el.classList.remove('tbl-cross-row');
      el.classList.remove('tbl-cross-col');
      el.classList.remove('tbl-cross-cell');
    });
    lastCells = [];
  }
  document.addEventListener('mouseover', function(e){
    var cell = e.target.closest('td, th');
    if(!cell) return;
    var tr = cell.parentElement;
    if(!tr) return;
    var table = cell.closest('table');
    if(!table) return;
    var colIdx = -1;
    var cs = tr.children;
    for(var i=0;i<cs.length;i++){
      if(cs[i]===cell){ colIdx = i; break; }
    }
    if(colIdx<0) return;
    clearCross();
    Array.prototype.forEach.call(tr.children, function(c){
      c.classList.add('tbl-cross-row');
      lastCells.push(c);
    });
    var rows = table.querySelectorAll('tr');
    rows.forEach(function(r){
      var ch = r.children[colIdx];
      if(ch && ch!==cell){
        ch.classList.add('tbl-cross-col');
        lastCells.push(ch);
      }
    });
    cell.classList.add('tbl-cross-cell');
    lastCells.push(cell);
  });
  document.addEventListener('mouseout', function(e){
    var to = e.relatedTarget;
    if(!to || !to.closest || !to.closest('table')){
      clearCross();
    }
  });
})();
</script>
