<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>戰情表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
      .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: 400; font-size: 20px; display: inline-flex; vertical-align: middle; user-select: none; }
    :root {
      --bg: #0D0D0D; --surface: #141414; --surface-hover: #1A1A1A;
      --border: #2A2A2A; --border-soft: #1F2937;
      --gain: #00D4AA; --loss: #FF4757; --warning: #FFB800; --info: #5B8FF9;
      --text: #FFFFFF; --text2: #AAAAAA; --text3: #828282;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: 400; font-size: 20px; display: inline-flex; vertical-align: middle; user-select: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-brand { padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .sidebar-brand h5 { font-size: 13px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 8px; margin: 0; }
    .sidebar-section { padding: 8px 0; }
    .sidebar-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px 4px; }
    .src-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 16px; color: var(--text2); font-size: 12px; transition: background 0.15s; }
    .src-item:hover { background: var(--surface-hover); }
    .src-item .material-symbols-outlined { font-size: 16px; color: var(--gain); flex-shrink: 0; margin-top: 1px; }
    .src-file { font-weight: 500; color: var(--text); }
    .src-sheet { color: var(--text3); }
    .main { flex: 1; padding: 20px 24px; max-width: 1200px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin: 0; }
    .meta-badges { display: flex; gap: 8px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 500; background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .badge .material-symbols-outlined { font-size: 14px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color 0.15s; }
    .kpi-card:hover { border-color: #3A3A3A; }
    .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 600; color: var(--gain); line-height: 1.2; }
    .chart-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
    .chart-card-wrap { min-width: 0; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .chart-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .chart-icon { font-size: 18px; color: var(--gain); }
    .chart-title { font-size: 13px; font-weight: 500; color: var(--text2); }
    .chart-body { position: relative; }
    .chart-canvas { width: 100%; height: 260px; }
    .data-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
    .data-table-scroll { max-height: 400px; overflow: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th { position: sticky; top: 0; background: var(--surface-hover); color: var(--text3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; z-index: 1; }
    .data-table th:hover { color: var(--text2); }
    .data-table td { padding: 7px 12px; border-bottom: 1px solid var(--border-soft); color: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 11px; white-space: nowrap; }
    .data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .data-table tr:hover td { background: var(--surface-hover); }
    .val-pos { color: var(--gain); }
    .val-neg { color: var(--loss); }
    .insights { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; }
    .insights h6 { font-size: 12px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 6px; margin: 0 0 8px 0; }
    .insights ul { list-style: none; padding: 0; margin: 0; }
    .insights li { padding: 5px 0; border-bottom: 1px solid var(--border-soft); font-size: 12px; line-height: 1.6; color: var(--text2); }
    .insights li:last-child { border: none; }
    .insights li .hl { color: var(--text); font-weight: 500; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 768px) {
      .chart-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h5><span class="material-symbols-outlined">monitoring</span>戰情表</h5>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">資料來源</div>
      <div v-for="src in sources" :key="src.key" class="src-item">
        <span class="material-symbols-outlined">description</span>
        <div>
          <div class="src-file">{{ src.file }}</div>
          <div class="src-sheet">{{ src.sheet }}</div>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">統計</div>
      <div class="src-item">
        <span class="material-symbols-outlined">table_rows</span>
        <div>{{ rowCount.toLocaleString() }} 列資料</div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="page-header">
      <h1><span class="material-symbols-outlined" style="color:var(--gain)">dashboard</span>資料儀表板</h1>
      <div class="meta-badges">
        <span class="badge"><span class="material-symbols-outlined">dataset</span> {{ totalSheets }} 個工作表</span>
        <span class="badge"><span class="material-symbols-outlined">bar_chart</span> {{ chartCount }} 張圖表</span>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card" v-for="kpi in kpis" :key="kpi.label">
        <div class="kpi-label">{{ kpi.label }}</div>
        <div class="kpi-value">{{ kpi.value }}</div>
      </div>
    </div>

    <!-- Chart Grid -->
    <div class="chart-grid">
      __CHART_DIVS__
    </div>

    <!-- Data Table -->
    __TABLE_HTML__

    <!-- Insights -->
    <div class="insights" v-if="insights.length">
      <h6><span class="material-symbols-outlined" style="font-size:16px;color:var(--warning)">lightbulb</span> 洞察分析</h6>
      <ul>
        <li v-for="(ins,i) in insights" :key="i" v-html="ins"></li>
      </ul>
    </div>
  </main>
</div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;

const SHEET_DATA = __SHEET_DATA__;
const SOURCES = __SOURCES__;
const KPIS = __KPIS__;
const TOTAL_ROWS = __TOTAL_ROWS__;
const CHART_COUNT = __CHART_COUNT__;

createApp({
  setup() {
    return {
      sources: SOURCES,
      kpis: ref(KPIS),
      insights: ref([]),
      rowCount: TOTAL_ROWS,
      totalSheets: SOURCES.length,
      chartCount: CHART_COUNT,
    };
  },
  mounted() {
    const ins = [];
    for (const [key, rows] of Object.entries(SHEET_DATA)) {
      if (!rows || !rows.length) continue;
      const sname = key.rsplit('/', 1)[-1];
      const numKeys = Object.keys(rows[0]).filter(k => typeof rows[0][k] === 'number');
      for (const n of numKeys) {
        const vals = rows.map(r => r[n]).filter(v => typeof v === 'number');
        if (vals.length > 0) {
          const sum = vals.reduce((a,b) => a+b, 0);
          const max = Math.max(...vals);
          const min = Math.min(...vals);
          const avg = sum / vals.length;
          if (max > avg * 1.5) {
            ins.push('📌 <span class="hl">' + sname + '</span> 的 <span class="hl">' + n + '</span> 最大值為 ' + max.toLocaleString() + '，遠高於平均值 ' + avg.toFixed(1));
          }
          if (min < 0) {
            ins.push('⚠️ <span class="hl">' + sname + '</span> 的 <span class="hl">' + n + '</span> 出現負值（' + min.toLocaleString() + '），需特別關注');
          }
        }
      }
    }
    ins.push('📊 共分析 <span class="hl">' + TOTAL_ROWS.toLocaleString() + '</span> 列資料、<span class="hl">' + SOURCES.length + '</span> 個工作表、產出 <span class="hl">' + CHART_COUNT + '</span> 張圖表');
    this.insights = ins.slice(0, 6);
    initCharts();
  },
  methods: {
    copyLink() {
      navigator.clipboard.writeText(window.location.href);
      alert('連結已複製');
    }
  }
}).mount('#app');

function initCharts() {
__CHART_SCRIPTS__
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    document.querySelectorAll('.chart-canvas').forEach(el => {
      const c = echarts.getInstanceByDom(el);
      if (c) c.resize();
    });
  }, 200);
});
</script>
</body>
</html>
